<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f8e8f5; /* 和截图一致的浅粉色背景 */
            min-height: 100vh;
            padding: 30px 20px;
        }

        /* 返回主页按钮 */
        .back-btn {
            background-color: #9c27b0;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            margin-bottom: 40px;
        }

        /* 标题 */
        .title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 36px;
            font-weight: bold;
            color: #000;
            margin-bottom: 40px;
        }

        .title .icon {
            font-size: 40px;
        }

        /* 按钮网格布局：一行2个 */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 按钮样式 */
        .grid-btn {
            background-color: white;
            border: none;
            border-radius: 20px;
            padding: 35px 20px;
            font-size: 24px;
            color: #000;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }

        .grid-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <!-- 返回主页按钮 -->
    <button class="back-btn" onclick="location.href='/'">← 返回主页</button>

    <!-- 标题 -->
    <div class="title">
        <span class="icon">⬇️</span>
        <span>下载中心</span>
    </div>

    <!-- 按钮区域，路径都是 f/ 文件夹下的 -->
    <div class="btn-grid">
        <button class="grid-btn" onclick="location.href='f/f1.html'">视频下载</button>
        <button class="grid-btn" onclick="location.href='f/f2.html'">音乐下载</button>
        <button class="grid-btn" onclick="location.href='f/f3.html'">图片下载</button>
        <button class="grid-btn" onclick="location.href='f/f4.html'">软件下载</button>
        <button class="grid-btn" onclick="location.href='f/f5.html'">文档下载</button>
        <button class="grid-btn" onclick="location.href='f/f6.html'">邮箱</button>
    </div>
</body>
</html>
