<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云服务导航</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0e17;
            --bg2: #111827;
            --card: rgba(17, 24, 39, 0.7);
            --card-hover: rgba(22, 33, 55, 0.85);
            --border: rgba(56, 239, 195, 0.12);
            --border-hover: rgba(56, 239, 195, 0.4);
            --accent: #38efc3;
            --accent2: #0ea5e9;
            --fg: #e8ecf4;
            --muted: #7a8ba8;
            --glow: rgba(56, 239, 195, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-layer::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(56,239,195,0.08) 0%, transparent 70%);
            animation: floatBlob1 18s ease-in-out infinite;
        }

        .bg-layer::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(14,165,233,0.07) 0%, transparent 70%);
            animation: floatBlob2 22s ease-in-out infinite;
        }

        .bg-blob-3 {
            position: absolute;
            top: 40%;
            left: 50%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(56,239,195,0.04) 0%, transparent 70%);
            animation: floatBlob3 15s ease-in-out infinite;
            transform: translate(-50%, -50%);
        }

        @keyframes floatBlob1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(80px, 60px) scale(1.15); }
            66% { transform: translate(-40px, 100px) scale(0.9); }
        }
        @keyframes floatBlob2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-70px, -50px) scale(1.1); }
            66% { transform: translate(50px, -80px) scale(0.95); }
        }
        @keyframes floatBlob3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(56,239,195,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56,239,195,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        #particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        main {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 24px 80px;
        }

        .header {
            text-align: center;
            margin-bottom: 56px;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 18px;
            border-radius: 100px;
            background: rgba(56,239,195,0.08);
            border: 1px solid rgba(56,239,195,0.2);
            font-size: 13px;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
            animation: fadeDown 0.8s ease-out;
        }

        .header-badge i {
            font-size: 11px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(42px, 7vw, 72px);
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1.05;
            margin-bottom: 16px;
            animation: fadeDown 0.8s ease-out 0.1s both;
        }

        .header h1 .highlight {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 17px;
            color: var(--muted);
            font-weight: 300;
            max-width: 480px;
            margin: 0 auto;
            line-height: 1.7;
            animation: fadeDown 0.8s ease-out 0.2s both;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1100px;
            width: 100%;
        }

        @media (max-width: 900px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 520px) {
            .grid { grid-template-columns: 1fr; max-width: 400px; }
        }

        .card {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 36px 20px 32px;
            border-radius: 20px;
            background: var(--card);
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            cursor: pointer;
            text-decoration: none;
            color: var(--fg);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            animation: cardIn 0.7s ease-out both;
        }

        .card:nth-child(1) { animation-delay: 0.15s; }
        .card:nth-child(2) { animation-delay: 0.22s; }
        .card:nth-child(3) { animation-delay: 0.29s; }
        .card:nth-child(4) { animation-delay: 0.36s; }
        .card:nth-child(5) { animation-delay: 0.43s; }
        .card:nth-child(6) { animation-delay: 0.50s; }
        .card:nth-child(7) { animation-delay: 0.57s; }
        .card:nth-child(8) { animation-delay: 0.64s; }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), var(--glow) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .card:hover::before { opacity: 1; }

        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(56,239,195,0.04), transparent);
            transition: left 0.6s ease;
            pointer-events: none;
        }

        .card:hover::after { left: 100%; }

        .card:hover {
            border-color: var(--border-hover);
            background: var(--card-hover);
            transform: translateY(-6px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 40px rgba(56,239,195,0.06);
        }

        .card:active { transform: translateY(-2px) scale(0.98); }

        .card-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 18px;
            position: relative;
            z-index: 1;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .card:hover .card-icon {
            transform: scale(1.1) translateY(-2px);
        }

        .card-name {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
            letter-spacing: 0.3px;
        }

        .card-desc {
            font-size: 12.5px;
            color: var(--muted);
            text-align: center;
            line-height: 1.5;
            position: relative;
            z-index: 1;
        }

        .card-arrow {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--muted);
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            opacity: 0;
            transform: translate(-4px, 4px);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 1;
        }

        .card:hover .card-arrow {
            opacity: 1;
            transform: translate(0, 0);
            color: var(--accent);
            border-color: var(--border-hover);
        }

        /* 各品牌配色 */
        .card-tencent .card-icon { background: linear-gradient(135deg, #006eff, #00c4ff); color: #fff; }
        .card-alibaba .card-icon { background: linear-gradient(135deg, #ff6a00, #ee0979); color: #fff; }
        .card-volc .card-icon { background: linear-gradient(135deg, #fe2c55, #ff6b81); color: #fff; }
        .card-baidu .card-icon { background: linear-gradient(135deg, #2196f3, #21b8f3); color: #fff; }
        .card-jd .card-icon { background: linear-gradient(135deg, #e1251b, #ff5252); color: #fff; }
        .card-aws .card-icon { background: linear-gradient(135deg, #ff9900, #ffb84d); color: #fff; }
        .card-azure .card-icon { background: linear-gradient(135deg, #0078d4, #00bcf2); color: #fff; }
        .card-gcp .card-icon { background: linear-gradient(135deg, #4285f4, #34a853); color: #fff; }

        /* 各品牌hover边框和光晕 */
        .card-tencent:hover { --border-hover: rgba(0,110,255,0.4); --glow: rgba(0,110,255,0.1); }
        .card-alibaba:hover { --border-hover: rgba(238,9,121,0.4); --glow: rgba(238,9,121,0.1); }
        .card-volc:hover { --border-hover: rgba(254,44,85,0.4); --glow: rgba(254,44,85,0.1); }
        .card-baidu:hover { --border-hover: rgba(33,184,243,0.4); --glow: rgba(33,184,243,0.1); }
        .card-jd:hover { --border-hover: rgba(225,37,27,0.4); --glow: rgba(225,37,27,0.1); }
        .card-aws:hover { --border-hover: rgba(255,153,0,0.4); --glow: rgba(255,153,0,0.1); }
        .card-azure:hover { --border-hover: rgba(0,120,212,0.4); --glow: rgba(0,120,212,0.1); }
        .card-gcp:hover { --border-hover: rgba(66,133,244,0.4); --glow: rgba(66,133,244,0.1); }

        .footer {
            margin-top: 56px;
            text-align: center;
            animation: fadeDown 0.8s ease-out 0.8s both;
        }

        .footer p {
            font-size: 13px;
            color: var(--muted);
            opacity: 0.6;
        }

        .clock {
            margin-top: 12px;
            font-family: 'Outfit', monospace;
            font-size: 14px;
            color: var(--muted);
            opacity: 0.5;
            letter-spacing: 2px;
        }

        .local-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 500;
            background: rgba(56,239,195,0.12);
            color: var(--accent);
            border: 1px solid rgba(56,239,195,0.2);
            z-index: 1;
            letter-spacing: 0.5px;
        }

        .cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(56,239,195,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
            transition: left 0.3s ease-out, top 0.3s ease-out;
        }

        /* 火山云特殊：图标内加一个小火焰动画 */
        .card-volc .card-icon .flame-icon {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-volc .card-icon .flame-icon::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 6px;
            background: rgba(255,255,255,0.25);
            border-radius: 50%;
            filter: blur(3px);
            animation: flameGlow 1.5s ease-in-out infinite;
        }
        @keyframes flameGlow {
            0%, 100% { opacity: 0.3; width: 16px; }
            50% { opacity: 0.7; width: 22px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

<div class="bg-layer">
    <div class="bg-blob-3"></div>
</div>
<div class="grid-bg"></div>
<canvas id="particles"></canvas>
<div class="cursor-glow" id="cursorGlow"></div>

<main>
    <header class="header">
        <div class="header-badge">
            <i class="fas fa-circle"></i>
            Cloud Services Portal
        </div>
        <h1>Cloud <span class="highlight">Navigator</span></h1>
        <p>快速直达国内外主流云服务平台，一站式云端入口</p>
    </header>

    <nav class="grid" aria-label="云服务导航">

        <a class="card card-tencent" href="h/h1.html" aria-label="前往腾讯云">
            <span class="card-arrow"><i class="fas fa-arrow-right"></i></span>
            <div class="card-icon">
                <i class="fab fa-tencent-weibo"></i>
            </div>
            <div class="card-name">腾讯云</div>
            <div class="card-desc">云计算、云数据库、CDN加速</div>
            <span class="local-badge">本地</span>
        </a>

        <a class="card card-alibaba" href="https://www.aliyun.com" target="_blank" rel="noopener" aria-label="前往阿里云">
            <span class="card-arrow"><i class="fas fa-arrow-up-right-from-square"></i></span>
            <div class="card-icon">
                <i class="fas fa-cloud"></i>
            </div>
            <div class="card-name">阿里云</div>
            <div class="card-desc">弹性计算、大数据、人工智能</div>
        </a>

        <a class="card card-volc" href="https://www.volcengine.com" target="_blank" rel="noopener" aria-label="前往火山云">
            <span class="card-arrow"><i class="fas fa-arrow-up-right-from-square"></i></span>
            <div class="card-icon">
                <span class="flame-icon"><i class="fas fa-fire"></i></span>
            </div>
            <div class="card-name">火山云</div>
            <div class="card-desc">字节跳动云服务、视频云、CDN</div>
        </a>

        <a class="card card-baidu" href="https://cloud.baidu.com" target="_blank" rel="noopener" aria-label="前往百度智能云">
            <span class="card-arrow"><i class="fas fa-arrow-up-right-from-square"></i></span>
            <div class="card-icon">
                <i class="fas fa-brain"></i>
            </div>
            <div class="card-name">百度智能云</div>
            <div class="card-desc">文心大模型、深度学习、AI Cloud</div>
        </a>

        <a class="card card-jd" href="https://www.jdcloud.com" target="_blank" rel="noopener" aria-label="前往京东云">
            <span class="card-arrow"><i class="fas fa-arrow-up-right-from-square"></i></span>
            <div class="card-icon">
                <i class="fas fa-cube"></i>
            </div>
            <div class="card-name">京东云</div>
            <div class="card-desc">电商基础设施、容器服务、CDN</div>
        </a>

        <a class="card card-aws" href="https://aws.amazon.com/cn/" target="_blank" rel="noopener" aria-label="前往AWS">
            <span class="card-arrow"><i class="fas fa-arrow-up-right-from-square"></i></span>
            <div class="card-icon">
                <i class="fab fa-aws"></i>
            </div>
            <div class="card-name">AWS</div>
            <div class="card-desc">Amazon云服务，全球市场领导者</div>
        </a>

        <a class="card card-azure" href="https://azure.microsoft.com/zh-cn/" target="_blank" rel="noopener" aria-label="前往Azure">
            <span class="card-arrow"><i class="fas fa-arrow-up-right-from-square"></i></span>
            <div class="card-icon">
                <i class="fab fa-microsoft"></i>
            </div>
            <div class="card-name">Azure</div>
            <div class="card-desc">微软智能云，混合云解决方案</div>
        </a>

        <a class="card card-gcp" href="https://cloud.google.com" target="_blank" rel="noopener" aria-label="前往Google Cloud">
            <span class="card-arrow"><i class="fas fa-arrow-up-right-from-square"></i></span>
            <div class="card-icon">
                <i class="fab fa-google"></i>
            </div>
            <div class="card-name">Google Cloud</div>
            <div class="card-desc">数据分析、机器学习、Kubernetes</div>
        </a>

    </nav>

    <footer class="footer">
        <p>点击卡片即可快速跳转至对应云服务平台</p>
        <div class="clock" id="clock"></div>
    </footer>
</main>

<script>
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const PARTICLE_COUNT = 50;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 0.5;
            this.speedX = (Math.random() - 0.5) * 0.3;
            this.speedY = (Math.random() - 0.5) * 0.3;
            this.opacity = Math.random() * 0.4 + 0.1;
            this.pulseSpeed = Math.random() * 0.02 + 0.005;
            this.pulsePhase = Math.random() * Math.PI * 2;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.pulsePhase += this.pulseSpeed;
            if (this.x < -10 || this.x > canvas.width + 10 ||
                this.y < -10 || this.y > canvas.height + 10) {
                this.reset();
            }
        }
        draw() {
            const pulse = Math.sin(this.pulsePhase) * 0.15 + 0.85;
            const alpha = this.opacity * pulse;
            ctx.beginPath();
            ctx.arc(this.x, this.y, Math.max(0.1, this.size), 0, Math.PI * 2);
            ctx.fillStyle = `rgba(56, 239, 195, ${alpha})`;
            ctx.fill();
        }
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

    function drawLines() {
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 150) {
                    const alpha = (1 - dist / 150) * 0.08;
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(56, 239, 195, ${alpha})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        }
    }

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        drawLines();
        requestAnimationFrame(animateParticles);
    }
    animateParticles();

    const cursorGlow = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', (e) => {
        cursorGlow.style.left = e.clientX + 'px';
        cursorGlow.style.top = e.clientY + 'px';
    });

    document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width * 100);
            const y = ((e.clientY - rect.top) / rect.height * 100);
            card.style.setProperty('--mx', x + '%');
            card.style.setProperty('--my', y + '%');
        });
    });

    function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('clock').textContent = `${h} : ${m} : ${s}`;
    }
    updateClock();
    setInterval(updateClock, 1000);
</script>

</body>
</html>
