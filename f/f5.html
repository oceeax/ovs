<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>输入与保存</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#f2f2f2;
    text-align:center;
}

h1{
    margin-top:20px;
}

textarea{
    width:90%;
    height:180px;
    margin-top:15px;
    padding:10px;
    font-size:16px;
    border-radius:10px;
    border:1px solid #ccc;
}

/* 按钮 */
.btn{
    padding:12px;
    border:none;
    border-radius:12px;
    color:#fff;
    font-size:15px;
}

/* 颜色 */
.blue{background:#2196F3;}
.green{background:#4CAF50;}
.red{background:#f44336;}
.purple{background:#9C27B0;}
.teal{background:#00BCD4;}

/* 布局 */
.row{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:12px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    width:90%;
    margin:12px auto;
}
</style>
</head>

<body>

<h1>输入与保存</h1>

<!-- 上方按钮 -->
<div class="row">
    <button class="btn red" onclick="clearText()">清空</button>
    <button class="btn teal" onclick="pasteText()">粘贴</button>
</div>

<textarea id="text" placeholder="在此输入内容..."></textarea>

<!-- 第一排 -->
<div class="row">
    <button class="btn blue" onclick="downloadFile('txt')">TXT</button>
    <button class="btn green" onclick="downloadWord()">Word</button>
    <button class="btn blue" onclick="downloadExcel()">Excel</button>
    <button class="btn green" onclick="downloadPPT()">PPT</button>
</div>

<!-- 第二排（4个一行） -->
<div class="grid">
    <button class="btn red" onclick="downloadCode('py')">Python</button>
    <button class="btn purple" onclick="downloadCode('java')">Java</button>
    <button class="btn red" onclick="downloadCode('cs')">C#</button>
    <button class="btn purple" onclick="downloadCode('html')">HTML</button>
</div>

<script>
const textArea=document.getElementById("text");

/* 清空 */
function clearText(){
    textArea.value="";
}

/* 粘贴 */
async function pasteText(){
    try{
        let text=await navigator.clipboard.readText();
        textArea.value+=text;
    }catch{
        alert("无法读取剪贴板");
    }
}

// === 核心修复：兼容所有浏览器的下载函数 ===
function saveFile(content, filename, type) {
    // 用 Blob 直接创建，不依赖 URL.revokeObjectURL 可能导致的跨域问题
    const blob = new Blob([content], { type });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    // 必须把元素加到 body 里再点击，避免部分浏览器的安全限制
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    // 延迟释放 URL，避免部分浏览器报错
    setTimeout(() => URL.revokeObjectURL(link.href), 100);
}

/* TXT纯文本 */
function downloadFile(ext){
    saveFile(textArea.value, "内容.txt", "text/plain;charset=utf-8");
}

/* Word 纯文本doc，不会变成网页 */
function downloadWord(){
    // 加上BOM头，避免中文乱码
    saveFile("\uFEFF" + textArea.value, "内容.doc", "application/msword;charset=utf-8");
}

/* Excel 纯文本csv格式，可直接用Excel打开 */
function downloadExcel(){
    let csv = textArea.value.replace(/\n/g,"\r\n");
    saveFile("\uFEFF" + csv, "内容.csv", "text/csv;charset=utf-8");
}

/* PPT 纯文本格式，可被WPS/Office识别 */
function downloadPPT(){
    saveFile(textArea.value, "内容.ppt", "application/vnd.ms-powerpoint;charset=utf-8");
}

/* 各类代码文件 */
function downloadCode(ext){
    let name = "代码." + ext;
    let type = "text/plain;charset=utf-8";
    if(ext === "html") type = "text/html;charset=utf-8";
    saveFile(textArea.value, name, type);
}
</script>

</body>
</html>
