<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>查看文档</title>
<style>
body{background:#ffeef5;margin:0;padding:20px;font-family:Arial;text-align:center;}
h1{color:#e05688;}
.btn{padding:12px 20px;margin:8px;border:none;border-radius:10px;background:#e05688;color:white;font-size:16px;cursor:pointer;width:80%;max-width:320px;}
#content{background:white;border-radius:10px;padding:15px;margin-top:15px;text-align:left;min-height:150px;white-space:pre-wrap;}
</style>
</head>
<body>
<h1>📄 查看文档</h1>
<input type="file" id="fileInput" accept=".txt,.html,.css,.js,.json" class="btn">
<div id="content">请选择文件查看内容</div>

<br>
<button class="btn" onclick="history.back()">返回上一页</button>
<button class="btn" onclick="location.href='../d.html'">返回文件管理</button>

<script>
const fileInput=document.getElementById('fileInput');
const content=document.getElementById('content');
fileInput.onchange=e=>{
const f=e.target.files[0];
if(!f)return;
const r=new FileReader();
r.onload=()=>content.textContent=r.result;
r.readAsText(f);
};
</script>
</body>
</html>
