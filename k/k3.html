<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
body{text-align:center;background:#faf8ef;margin:0;padding:20px;font-family:Arial;}
h1{color:#776e65;}
#board{display:grid;grid-template-columns:repeat(4,80px);gap:8px;margin:0 auto;width:344px;}
.cell{width:80px;height:80px;background:#cdc1b4;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:#776e65;}
.btns{margin-top:15px;}
button{padding:10px 18px;margin:5px;border:none;border-radius:8px;background:#8f7a66;color:white;font-size:16px;cursor:pointer;}
</style>
</head>
<body>
<h1>🔢 2048</h1>
<div id="board"></div>
<div class="btns">
<button onclick="history.back()">返回上一页</button>
<button onclick="location.href='../index.html'">返回主页</button>
</div>

<script>
let board=Array(4).fill().map(()=>Array(4).fill(0));
function add(){
let empty=[];
for(let i=0;i<4;i++)for(let j=0;j<4;j++)if(!board[i][j])empty.push([i,j]);
if(empty.length){let [i,j]=empty[Math.floor(Math.random()*empty.length)];board[i][j]=Math.random()<0.9?2:4;}
render();
}
function render(){
const div=document.getElementById('board');div.innerHTML='';
for(let i=0;i<4;i++)for(let j=0;j<4;j++){
const cell=document.createElement('div');cell.className='cell';
cell.textContent=board[i][j]||'';div.appendChild(cell);
}
}
add();add();render();
document.addEventListener('keydown',e=>{
if(e.key.startsWith('Arrow')){add();render();}
});
</script>
</body>
</html>
