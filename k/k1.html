<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
body{text-align:center;background:#fff5f5;margin:0;padding:20px;font-family:Arial;}
h1{color:#ff6b6b;}
canvas{border:3px solid #ff6b6b;background:#fff;}
.btns{margin-top:15px;}
button{padding:10px 18px;margin:5px;border:none;border-radius:8px;background:#ff6b6b;color:white;font-size:16px;cursor:pointer;}
</style>
</head>
<body>
<h1>🐍 贪吃蛇</h1>
<canvas id="game" width="300" height="300"></canvas>
<div class="btns">
<button onclick="history.back()">返回上一页</button>
<button onclick="location.href='../index.html'">返回主页</button>
</div>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
let snake=[{x:10,y:10}];
let food={x:15,y:15};
let dx=1,dy=0;
function draw(){
ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle='#ff6b6b';snake.forEach(seg=>ctx.fillRect(seg.x*10,seg.y*10,9,9));
ctx.fillStyle='#4ecdc4';ctx.fillRect(food.x*10,food.y*10,9,9);
}
function move(){
const head={x:snake[0].x+dx,y:snake[0].y+dy};
snake.unshift(head);
if(head.x===food.x&&head.y===food.y){
food={x:Math.floor(Math.random()*30),y:Math.floor(Math.random()*30)};
}else{snake.pop();}
if(head.x<0||head.x>=30||head.y<0||head.y>=30)reset();
snake.slice(1).forEach(seg=>{if(seg.x===head.x&&seg.y===head.y)reset();});
}
function reset(){snake=[{x:10,y:10}];dx=1;dy=0;}
document.addEventListener('keydown',e=>{
if(e.key==='ArrowLeft'&&dx!==1){dx=-1;dy=0;}
if(e.key==='ArrowRight'&&dx!==-1){dx=1;dy=0;}
if(e.key==='ArrowUp'&&dy!==1){dx=0;dy=-1;}
if(e.key==='ArrowDown'&&dy!==-1){dx=0;dy=1;}
});
setInterval(()=>{move();draw();},100);
</script>
</body>
</html>
