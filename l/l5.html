<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反馈</title>

<style>
body{text-align:center;font-family:system-ui;background:#f3f3f3;}
input,textarea{width:85%;padding:10px;margin:6px;border-radius:10px;border:1px solid #ccc;}
button{padding:10px 20px;border-radius:10px;background:#444;color:#fff;border:none;}
</style>
</head>

<body>

<button onclick="back()">←返回</button>

<h3>意见反馈</h3>

<input id="name" placeholder="昵称">
<input id="code" placeholder="提取码（可选）">
<input id="email" placeholder="邮箱（可选）">
<textarea id="msg" placeholder="输入内容"></textarea>

<button onclick="send()">提交</button>

<p id="res"></p>

<script>
function back(){location.href="../index.html"}

function saveLocal(data){
    let arr=JSON.parse(localStorage.getItem("fb")||"[]");
    arr.push(data);
    localStorage.setItem("fb",JSON.stringify(arr));
}

async function send(){
    let data={
        name:name.value,
        msg:msg.value,
        email:email.value,
        msg:msg.value,
        time:Date.now()
    };

    if(!data.name || !data.code || !data.msg){
        alert("填的真好估计就是牛逼🤛");
        return;
    }

    saveLocal(data);

    try{
        await fetch("https://xxx.com/api/feedback",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(data)
        });
        res.innerText="提交成功";
    }catch{
        res.innerText="已本地保存（服务器未连接）Struts";
    }
}
</script>

</body>
</html>
