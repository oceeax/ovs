<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图像测试</title>

<style>
body{text-align:center;font-family:system-ui;background:#f3f3f3;}
canvas{border:1px solid #aaa;margin-top:20px;}
button{margin:5px;padding:10px;border-radius:10px;background:#444;color:#fff;border:none;}
</style>
</head>

<body>

<button onclick="back()">←返回</button>
<h3>图像测试</h3>

<button onclick="noise()">噪点</button>
<button onclick="circle()">圆形</button>
<button onclick="gradient()">渐变</button>
<button onclick="loadImg()">图片加载</button>
<button onclick="animate()">动画</button>

<canvas id="c" width="300" height="300"></canvas>

<script>
function back(){location.href="../index.html"}
let ctx=c.getContext("2d");

function noise(){
    for(let i=0;i<2000;i++){
        ctx.fillStyle=`rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;
        ctx.fillRect(Math.random()*300,Math.random()*300,3,3);
    }
}

function circle(){
    ctx.clearRect(0,0,300,300);
    ctx.beginPath();
    ctx.arc(150,150,100,0,Math.PI*2);
    ctx.fillStyle="skyblue";
    ctx.fill();
}

function gradient(){
    let g=ctx.createLinearGradient(0,0,300,300);
    g.addColorStop(0,"red");
    g.addColorStop(1,"blue");
    ctx.fillStyle=g;
    ctx.fillRect(0,0,300,300);
}

function loadImg(){
    let img=new Image();
    img.src="https://picsum.photos/300";
    img.onload=()=>ctx.drawImage(img,0,0);
}

function animate(){
    let x=0;
    function loop(){
        ctx.clearRect(0,0,300,300);
        ctx.fillRect(x,100,50,50);
        x+=2;
        if(x<300) requestAnimationFrame(loop);
    }
    loop();
}
</script>

</body>
</html>
