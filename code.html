<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>32位长密钥激活码生成</title>
</head>
<body style="padding:20px;">
<h3>🔐 批量生成32位高强度激活码</h3>
<br>
<button onclick="createCode(10)">生成 10 个</button>
<button onclick="createCode(50)">生成 50 个</button>
<button onclick="createCode(100)">生成 100 个</button>
<br><br>
<textarea id="box" style="width:100%;height:320px;"></textarea>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient(
    "https://czispkecvokqsvomquqo.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6aXNwa2Vjdm9rcXN2b21xdXFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxODc4MDEsImV4cCI6MjA5Mjc2MzgwMX0.0S1DcKYE1aVjaZsAKURzGdd4X2G2q5o570Q6pUiOWp0"
);

// 生成32位 大小写+数字 复杂密钥
function getLongCode(){
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    let res = "";
    for(let i=0;i<32;i++){
        res += chars[Math.floor(Math.random() * chars.length)];
    }
    return res;
}

async function createCode(num){
    let codeList = [];
    let insertArr = [];
    for(let i=0;i<num;i++){
        let c = getLongCode();
        codeList.push(c);
        insertArr.push({code:c});
    }
    await sb.from("activation_code").insert(insertArr);
    document.getElementById("box").value = codeList.join("\n\n");
    alert("✅ 生成完成，已自动存入数据库");
}
</script>
</body>
</html>
