<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>6位数字激活码生成器</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body {
    font-family: sans-serif;
    background: #f5f5f5;
    padding: 30px;
}
.box {
    max-width: 400px;
    margin: 0 auto;
    background: #fff;
    padding: 20px;
    border-radius: 12px;
}
button {
    padding: 10px 20px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
textarea {
    width: 100%;
    height: 100px;
    margin: 15px 0;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
}
</style>
</head>
<body>
<div class="box">
    <h3>一键生成6位数字激活码</h3>
    <button onclick="gen()">生成新码</button>
    <textarea id="out" readonly placeholder="生成的激活码会显示在这里"></textarea>
    <div id="msg"></div>
</div>

<script>
// 你的 Supabase 配置（已填好）
const sb = supabase.createClient(
    "https://czispkecvokqsvomquqo.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6aXNwa2Vjdm9rcXN2b21xdXFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxODc4MDEsImV4cCI6MjA5Mjc2MzgwMX0.0S1DcKYE1aVjaZsAKURzGdd4X2G2q5o570Q6pUiOWp0"
);

// 生成6位数字
function rand6() {
    return String(Math.floor(Math.random() * 900000) + 100000);
}

async function gen() {
    const code = rand6();
    const { error } = await sb.from("activation_code")
        .insert({ code: code, used: false });

    if (error) {
        document.getElementById("msg").innerText = "❌ 失败：" + error.message;
    } else {
        document.getElementById("out").value = code;
        document.getElementById("msg").innerText = "✅ 生成成功！";
    }
}
</script>
</body>
</html>
