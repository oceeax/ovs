<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>激活码生成器</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{padding:30px;font-family:微软雅黑;background:#f5f5f5;}
.box{max-width:400px;margin:0 auto;background:#fff;padding:20px;border-radius:12px;}
button{padding:10px 20px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer;}
textarea{width:100%;height:120px;margin:15px 0;padding:10px;border:1px solid #ccc;border-radius:6px;}
</style>
</head>
<body>
<div class="box">
<h3>批量生成32位激活码</h3>
<button onclick="createCode()">生成并自动入库</button>
<textarea id="res" readonly></textarea>
<div id="tip"></div>
</div>

<script>
// 和你网站完全一致的密钥+地址
const sb = supabase.createClient(
    "https://czispkecvokqsvomquqo.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6aXNwa2Vjdm9rcXN2b21xdXFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxODc4MDEsImV4cCI6MjA5Mjc2MzgwMX0.0S1DcKYE1aVjaZsAKURzGdd4X2G2q5o570Q6pUiOWp0"
);

// 随机32位激活码
function randCode(){
    const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let str = "";
    for(let i=0;i<32;i++){
        str += chars.charAt(Math.floor(Math.random()*chars.length));
    }
    return str;
}

async function createCode(){
    const code = randCode();
    const {error} = await sb.from("activation_code").insert({
        code:code,
        used:false
    });
    if(error){
        document.getElementById("tip").innerText = "失败："+error.message;
    }else{
        document.getElementById("res").value = code;
        document.getElementById("tip").innerText = "✅ 生成+入库成功";
    }
}
</script>
</body>
</html>
