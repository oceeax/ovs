<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>激活码生成器</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{padding:30px;font-family:sans-serif;background:#f5f5f5;}
.box{max-width:400px;margin:0 auto;background:#fff;padding:20px;border-radius:12px;}
button{padding:10px 20px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer;}
textarea{width:100%;height:120px;margin:15px 0;padding:10px;border:1px solid #ccc;border-radius:6px;}
</style>
</head>
<body>
<div class="box">
<h3>一键生成32位激活码（自动入库）</h3>
<button onclick="gen()">生成新激活码</button>
<textarea id="out" readonly placeholder="生成后显示在这里"></textarea>
<div id="msg"></div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  "https://czispkecvokqsvomquqo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6aXNwa2Vjdm9rcXN2b21xdXFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxODc4MDEsImV4cCI6MjA5Mjc2MzgwMX0.0S1DcKYE1aVjaZsAKURzGdd4X2G2q5o570Q6pUiOWp0"
);

// 随机32位大小写+数字
function random32(){
  const c = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let s = "";
  for(let i=0;i<32;i++) s += c[Math.floor(Math.random()*c.length)];
  return s;
}

async function gen(){
  const code = random32();
  const {error} = await sb.from("activation_code").insert({
    code: code,
    used: false
  });
  if(error){
    document.getElementById("msg").innerText = "❌ 入库失败："+error.message;
  }else{
    document.getElementById("out").value = code;
    document.getElementById("msg").innerText = "✅ 生成并入库成功";
  }
}
</script>
</body>
</html>
