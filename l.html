<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测试中心</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:linear-gradient(135deg,#1f1c2c,#928dab);
    color:#fff;
}
.title{
    text-align:center;
    margin-top:60px;
    font-size:28px;
}
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    padding:20px;
}
.card{
    background:rgba(255,255,255,0.1);
    border-radius:16px;
    padding:20px;
    text-align:center;
    backdrop-filter:blur(10px);
    cursor:pointer;
}
.bottom{
    position:fixed;
    bottom:0;
    width:100%;
    background:#222;
    display:flex;
}
.bottom div{
    flex:1;
    text-align:center;
    padding:10px;
}
</style>
</head>

<body>

<div class="title">⚙️ 测试中心</div>

<div class="grid">
<div class="card" onclick="go('l/l1.html')">二维码</div>
<div class="card" onclick="go('l/l2.html')">性能</div>
<div class="card" onclick="go('l/l3.html')">图像</div>
<div class="card" onclick="go('l/l4.html')">刷新</div>
<div class="card" onclick="go('l/l5.html')">反馈</div>
    <div class="card" onclick="go('l/l6.html')">下载测试</div>
    <div class="card" onclick="go('l/l7.html')">调用测试</div>
    <div class="card" onclick="go('l/l8.html')">接口测试</div>
    <div class="card" onclick="go('l/l9.html')">代码测试</div>
    <div class="card" onclick="go('l/l10.html')">其他测试</div>
</div>

<div class="bottom">
<div>主页</div>
<div onclick="go('l/l5.html')">反馈</div>
</div>

<script>
function go(u){location.href=u}
</script>

</body>
</html>
