<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片编辑器(plus)️ 🏝️</title>

<style>
body{margin:0;background:#111;color:#fff;text-align:center;}
button{margin:5px;padding:10px;border:none;border-radius:8px;background:#333;color:#fff;}
.viewer{width:95%;height:70vh;margin:10px auto;border:2px solid #555;overflow:auto;background:#000;}
canvas{background:#fff;display:block;}
#info{color:#0f0;margin-top:5px;}
</style>
</head>

<body>

<h3>图片编辑（️合并版）</h3>

<button onclick="selectBase()">底图</button>
<button onclick="addImage()">添加图片</button>
<button onclick="deleteOne()">删除</button>
<button onclick="clearAll()">清空</button>
<button onclick="download()">下载</button>

<div id="info">坐标：0 , 0</div>

<div class="viewer">
<canvas id="canvas"></canvas>
</div>

<input type="file" id="baseInput" hidden>
<input type="file" id="addInput" hidden multiple>

<script>
const W=5000;
const H=6666;

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=W;
canvas.height=H;

let base=null;
let imgs=[];
let selected=null;

let displayScale=1;

function fitScreen(){
    let scale=Math.min(window.innerWidth/W,(window.innerHeight*0.7)/H);
    displayScale=scale;
    canvas.style.width=W*scale+"px";
    canvas.style.height=H*scale+"px";
}
fitScreen();

function selectBase(){baseInput.click();}
function addImage(){addInput.click();}

baseInput.onchange=e=>{
    let f=e.target.files[0];
    if(!f)return;

    let img=new Image();
    img.onload=()=>{
        base=img;
        imgs=[];
        selected=null;
        draw();
    }
    img.src=URL.createObjectURL(f);
}

addInput.onchange=e=>{
    [...e.target.files].forEach(file=>{
        let img=new Image();
        img.onload=()=>{
            let obj={
                img,
                x:W/2,
                y:H/2,
                scale:1,
                rot:0
            };
            imgs.push(obj);
            selected=obj;
            draw();
        }
        img.src=URL.createObjectURL(file);
    });
}

function deleteOne(){
    if(!selected)return;
    imgs=imgs.filter(i=>i!==selected);
    selected=imgs[imgs.length-1]||null;
    draw();
}

function clearAll(){
    imgs=[];
    selected=null;
    draw();
}

function draw(){
    ctx.clearRect(0,0,W,H);

    if(base){
        ctx.drawImage(base,0,0);
    }

    imgs.forEach(o=>{
        ctx.save();
        ctx.translate(o.x,o.y);
        ctx.rotate(o.rot);
        ctx.scale(o.scale,o.scale);
        ctx.drawImage(o.img,-o.img.width/2,-o.img.height/2);

        if(o===selected){
            ctx.strokeStyle="red";
            ctx.lineWidth=3;
            ctx.strokeRect(-o.img.width/2,-o.img.height/2,o.img.width,o.img.height);
        }

        ctx.restore();
    });

    if(selected){
        info.innerText="坐标："+Math.round(selected.x)+" , "+Math.round(selected.y);
    }
}

/* 手势 */
let lastX,lastY,lastDist,lastAng;

canvas.addEventListener("touchstart",e=>{
    if(e.touches.length==1){
        let t=e.touches[0];
        lastX=t.clientX;
        lastY=t.clientY;
        selected=imgs[imgs.length-1];
    }

    if(e.touches.length==2){
        let dx=e.touches[0].clientX-e.touches[1].clientX;
        let dy=e.touches[0].clientY-e.touches[1].clientY;
        lastDist=Math.hypot(dx,dy);
        lastAng=Math.atan2(dy,dx);
    }
});

canvas.addEventListener("touchmove",e=>{
    e.preventDefault();

    if(e.touches.length==1 && selected){
        let t=e.touches[0];

        let dx=(t.clientX-lastX)/displayScale;
        let dy=(t.clientY-lastY)/displayScale;

        selected.x+=dx;
        selected.y+=dy;

        lastX=t.clientX;
        lastY=t.clientY;
    }

    if(e.touches.length==2 && selected){
        let dx=e.touches[0].clientX-e.touches[1].clientX;
        let dy=e.touches[0].clientY-e.touches[1].clientY;

        let dist=Math.hypot(dx,dy);
        let ang=Math.atan2(dy,dx);

        selected.scale*=dist/lastDist;
        selected.rot+=ang-lastAng;

        lastDist=dist;
        lastAng=ang;
    }

    draw();
});

canvas.addEventListener("touchend",()=>{lastDist=null});

/* ✅ 核心：像素级裁剪 */
function download(){
    let imgData=ctx.getImageData(0,0,W,H).data;

    let top=0,bottom=H-1,left=0,right=W-1;
    let found=false;

    // top
    for(let y=0;y<H;y++){
        for(let x=0;x<W;x++){
            if(imgData[(y*W+x)*4+3]>0){
                top=y; found=true; break;
            }
        }
        if(found)break;
    }

    // bottom
    found=false;
    for(let y=H-1;y>=0;y--){
        for(let x=0;x<W;x++){
            if(imgData[(y*W+x)*4+3]>0){
                bottom=y; found=true; break;
            }
        }
        if(found)break;
    }

    // left
    found=false;
    for(let x=0;x<W;x++){
        for(let y=0;y<H;y++){
            if(imgData[(y*W+x)*4+3]>0){
                left=x; found=true; break;
            }
        }
        if(found)break;
    }

    // right
    found=false;
    for(let x=W-1;x>=0;x--){
        for(let y=0;y<H;y++){
            if(imgData[(y*W+x)*4+3]>0){
                right=x; found=true; break;
            }
        }
        if(found)break;
    }

    let cw=right-left+1;
    let ch=bottom-top+1;

    let temp=document.createElement("canvas");
    temp.width=cw;
    temp.height=ch;
    let tctx=temp.getContext("2d");

    tctx.drawImage(canvas,left,top,cw,ch,0,0,cw,ch);

    let q=0.98;

    function run(){
        let data=temp.toDataURL("image/jpeg",q);
        let size=data.length*0.75/1024/1024;

        if(size>30 && q>0.3){
            q-=0.05;
            run();
        }else{
            let a=document.createElement("a");
            a.href=data;
            a.download="质感太棒了👍🏻.jpg";
            a.click();
        }
    }

    run();
}
</script>

</body>
</html>
