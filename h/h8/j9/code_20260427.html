<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>官方购买渠道</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #222;
        }
        .subtitle {
            font-size: 18px;
            color: #07c160;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .desc {
            font-size: 16px;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.8;
        }
        .qrcode {
            width: 100%;
            max-width: 320px;
            margin: 0 auto 30px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            background: #f8f9fa;
            padding: 12px;
        }
        .qrcode img {
            width: 100%;
            display: block;
            border-radius: 8px;
        }
        .btn {
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, #07c160, #06ad56);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(7, 193, 96, 0.3);
            transition: transform 0.2s ease;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .tip {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">🔐 硬核工具官方购买</div>
        <div class="subtitle">永久授权，仅需 10 元</div>
        <div class="desc">
            欢迎使用硬核工具，请到官方购买，每个仅需十元永久有效。<br>
            扫码添加客服，获取激活方式，一对一服务。
        </div>
        <div class="qrcode">
            <!-- 已按你的路径修改图片地址 -->
            <img src="h/h8/j9/nbnb.jpg" alt="官方客服二维码">
        </div>
        <a href="javascript:history.back()" class="btn">返回继续使用</a>
        <div class="tip">扫码添加后，请备注“工具购买”</div>
    </div>
</body>
</html>
