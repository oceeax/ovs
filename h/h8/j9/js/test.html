<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>请先登录 | 工具集 · 创意工坊</title>
    <!-- 更现代通用字体 Inter & 备选系统字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (丰富图标库，表现各种工具感) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: linear-gradient(135deg, #f5f7fe 0%, #e9eefa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }
        
        /* 背景氛围光晕 - 更科技通用感 */
        body::before {
            content: "";
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.08), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* 主卡片 - 现代柔和玻璃质感 */
        .login-prompt-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2), 0 8px 20px rgba(0, 0, 0, 0.02), inset 0 1px 0 rgba(255,255,255,0.7);
            max-width: 540px;
            width: 100%;
            padding: 2.5rem 2rem 2.8rem;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            text-align: center;
            z-index: 2;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .login-prompt-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 32px 52px -18px rgba(0, 0, 0, 0.28);
        }

        /* 多工具图标元素组合 */
        .tools-icon-stack {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        
        .icon-badge {
            background: white;
            width: 64px;
            height: 64px;
            border-radius: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 18px -8px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255,255,255,0.8);
            transition: all 0.2s;
        }
        
        .icon-badge i {
            font-size: 2rem;
            background: linear-gradient(125deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* 不同工具展示不同色彩倾向 */
        .icon-badge:nth-child(1) i { background: linear-gradient(125deg, #3b82f6, #06b6d4); -webkit-background-clip: text; background-clip: text; }
        .icon-badge:nth-child(2) i { background: linear-gradient(125deg, #8b5cf6, #d946ef); -webkit-background-clip: text; background-clip: text; }
        .icon-badge:nth-child(3) i { background: linear-gradient(125deg, #f59e0b, #ef4444); -webkit-background-clip: text; background-clip: text; }
        .icon-badge:nth-child(4) i { background: linear-gradient(125deg, #10b981, #14b8a6); -webkit-background-clip: text; background-clip: text; }
        
        /* 主欢迎标题 —— 通用 不局限于画图 */
        .greeting-text {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #1e293b, #2d3a5e, #2563eb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.75rem;
            line-height: 1.3;
        }

        /* 辅助说明短语 */
        .sub-message {
            font-size: 1rem;
            color: #4b5b7c;
            margin-bottom: 2rem;
            font-weight: 450;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            background: rgba(59,130,246,0.05);
            padding: 0.5rem 1rem;
            border-radius: 48px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        
        .sub-message i {
            font-size: 0.85rem;
            color: #3b82f6;
        }

        /* 通用精致按钮 */
        .btn-login {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(105deg, #2563eb 0%, #6366f1 100%);
            border: none;
            padding: 1rem 2rem;
            font-size: 1.05rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 12px 20px -12px rgba(37, 99, 235, 0.45);
            width: auto;
            min-width: 210px;
            letter-spacing: 0.2px;
        }

        .btn-login i {
            font-size: 1.1rem;
            transition: transform 0.2s ease;
        }

        .btn-login:hover {
            background: linear-gradient(105deg, #3b82f6 0%, #8b5cf6 100%);
            transform: scale(1.02);
            box-shadow: 0 18px 28px -12px rgba(59,130,246,0.5);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        /* 工具特性列表 */
        .feature-badges {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.7rem;
            margin-top: 2rem;
            margin-bottom: 0.4rem;
        }
        
        .feature-badge {
            background: #f1f4f9;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #2c3e66;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        
        .feature-badge i {
            font-size: 0.7rem;
            color: #3b82f6;
        }
        
        /* 脚注微信息 */
        .footnote {
            margin-top: 1.6rem;
            font-size: 0.72rem;
            color: #7c8ba0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,245,0.7);
            padding: 0.25rem 1rem;
            border-radius: 30px;
        }
        .footnote i {
            font-size: 0.7rem;
        }

        @media (max-width: 550px) {
            .login-prompt-card {
                padding: 2rem 1.5rem 2.2rem;
            }
            .greeting-text {
                font-size: 1.55rem;
            }
            .btn-login {
                padding: 0.85rem 1.4rem;
                font-size: 0.95rem;
                min-width: 180px;
            }
            .icon-badge {
                width: 52px;
                height: 52px;
            }
            .icon-badge i {
                font-size: 1.6rem;
            }
            .tools-icon-stack {
                gap: 8px;
            }
        }

        /* 优雅入场动画 */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-prompt-card {
            animation: fadeSlideUp 0.5s ease-out;
        }
    </style>
</head>
<body>

<div class="login-prompt-card">
    <!-- 工具icon组合 突出多工具生态 -->
    <div class="tools-icon-stack">
        <div class="icon-badge"><i class="fas fa-pen-fancy"></i></div>
        <div class="icon-badge"><i class="fas fa-robot"></i></div>
        <div class="icon-badge"><i class="fas fa-chart-line"></i></div>
        <div class="icon-badge"><i class="fas fa-palette"></i></div>
        <div class="icon-badge"><i class="fas fa-file-alt"></i></div>
    </div>
    
    <!-- 核心欢迎语: 通用+不土+随性又有力 (15字内) -->
    <div class="greeting-text">
        欢迎登录，解锁你的全部工具
    </div>
    
    <div class="sub-message">
        <i class="fas fa-plug"></i> 写作 · 设计 · 分析 · 智能助手 · 更多生产力
    </div>
    
    <!-- 主要按钮跳转login.html -->
    <button class="btn-login" id="goToLoginBtn">
        <i class="fas fa-arrow-right-to-bracket"></i> 
        立即登录 / 注册
        <i class="fas fa-bolt" style="font-size: 0.85rem;"></i>
    </button>
    
    <!-- 次要工具标签，增加可信赖感，展示不限于美图的实际能力 -->
    <div class="feature-badges">
        <span class="feature-badge"><i class="fas fa-magic"></i> AI生成</span>
        <span class="feature-badge"><i class="fas fa-chart-simple"></i> 数据看板</span>
        <span class="feature-badge"><i class="fas fa-image"></i> 智能绘图</span>
        <span class="feature-badge"><i class="fas fa-comment-dots"></i> 对话助手</span>
        <span class="feature-badge"><i class="fas fa-code"></i> 代码工具</span>
        <span class="feature-badge"><i class="fas fa-code"></i> 智能影音</span>
        
    </div>
    
    <div class="footnote">
        <i class="fas fa-shield-alt"></i> 一次登录·畅享全平台工具
    </div>
</div>

<!-- 极简氛围圆点 -->
<div style="position: fixed; width: 280px; height: 280px; bottom: -10%; right: -5%; background: radial-gradient(circle, rgba(59,130,246,0.1), transparent 70%); border-radius: 50%; pointer-events: none; z-index: 0;"></div>
<div style="position: fixed; width: 200px; height: 200px; top: -8%; left: -5%; background: radial-gradient(circle, rgba(139,92,246,0.08), transparent 70%); border-radius: 50%; pointer-events: none; z-index: 0;"></div>

<script>
    (function() {
        const loginBtn = document.getElementById('goToLoginBtn');
        
        const redirectToLogin = () => {
            if (loginBtn) {
                // 轻量化按压反馈
                loginBtn.style.transform = 'scale(0.96)';
                setTimeout(() => {
                    loginBtn.style.transform = '';
                }, 120);
            }
            // 跳转到登录页面（同目录下 login.html）
            window.location.href = '/login.html';
        };
        
        if (loginBtn) {
            loginBtn.addEventListener('click', redirectToLogin);
            loginBtn.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    redirectToLogin();
                }
            });
            loginBtn.setAttribute('aria-label', '前往登录页面，使用全部工具');
        }
        
        // 控制台输出友好提示
        console.log('🧰 工具箱提示：请先登录，解锁写作/AI/设计等多维能力');
    })();
</script>
</body>
</html>
