<!-- Supabase（仅用于查激活码是否已用） -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient(
    "https://czispkecvokqsvomquqo.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6aXNwa2Vjdm9rcXN2b21xdXFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxODc4MDEsImV4cCI6MjA5Mjc2MzgwMX0.0S1DcKYE1aVjaZsAKURzGdd4X2G2q5o570Q6pUiOWp0"
);

const loginNav = document.getElementById("loginNav");
const userNav = document.getElementById("userNav");
const userEmail = document.getElementById("userEmail");
const activatePop = document.getElementById("activatePop");

let isActOk = false;

// 登录状态检测（保留但不影响激活逻辑）
async function checkLogin(){
    const {data:{session}} = await sb.auth.getSession();
    if(session){
        loginNav.style.display = "none";
        userNav.style.display = "block";
        userEmail.innerText = session.user.email;
    }else{
        loginNav.style.display = "block";
        userNav.style.display = "none";
    }
}

// 退出登录
async function doLogout(){
    await sb.auth.signOut();
    location.reload();
}

// 核心：检查本地是否已激活
function checkLocalActivate(){
    const localCode = localStorage.getItem("act_code");
    if(localCode){
        isActOk = true;
        activatePop.classList.add("hide");
    }else{
        isActOk = false;
        activatePop.classList.remove("hide");
        // 强制拦截所有功能按钮
        document.querySelectorAll(".card").forEach(item=>{
            item.onclick = function(e){
                if(!isActOk){
                    e.preventDefault();
                    alert("⚠️ 请先输入官方激活码解锁功能！");
                }
            }
        })
    }
}

// 绑定激活码（不绑账号，只标记used+存本地）
async function bindCode(){
    const codeVal = document.getElementById("actCode").value.trim();
    if(!codeVal) return alert("请粘贴32位激活码");

    // 1. 检查激活码是否存在且未使用
    const {count, error} = await sb.from("activation_code")
        .select("*", {count:'exact', head:true})
        .eq("code", codeVal)
        .eq("used", false);

    if(error || count===0) return alert("❌ 激活码无效/错误/已被使用");

    // 2. 标记为已使用
    const {error:updErr} = await sb.from("activation_code")
        .update({used:true})
        .eq("code", codeVal);

    if(updErr) return alert("❌ 标记失败："+updErr.message);

    // 3. 存本地，永久有效（清缓存/换设备失效）
    localStorage.setItem("act_code", codeVal);

    alert("✅ 激活成功！永久解锁全部工具");
    location.reload();
}

// 页面加载
window.onload = function(){
    checkLogin();
    checkLocalActivate();
};
</script>
