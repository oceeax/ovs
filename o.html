<head>
<meta charset="UTF-8">

<title>学习工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC",sans-serif;background:#f5f5f7;min-height:100vh}
.hd{background:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;border-bottom:1px solid #eee}
.hd a{color:#333;text-decoration:none;font-size:22px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:#f5f5f7}
.hd h1{flex:1;font-size:17px;font-weight:600}
.main{max-width:560px;margin:0 auto;padding:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#fff;border-radius:16px;padding:32px 16px;text-align:center;text-decoration:none;color:#333;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:transform .15s;display:flex;flex-direction:column;align-items:center;gap:14px}
.card:active{transform:scale(.97)}
.card .icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px}
.card .name{font-size:15px;font-weight:600}
.c1 .icon{background:#fff3e0;color:#ef6c00}
.c2 .icon{background:#e3f2fd;color:#1565c0}
.c3 .icon{background:#fce4ec;color:#c62828}
.c4 .icon{background:#e8f5e9;color:#2e7d32}
.c5 .icon{background:#f3e5f5;color:#7b1fa2}
.c6 .icon{background:#e0f7fa;color:#00838f}
.c7 .icon{background:#fff8e1;color:#f57f17}
.c8 .icon{background:#ede7f6;color:#4527a0}
.foot{max-width:560px;margin:20px auto;padding:0 16px;display:flex;gap:10px}
.foot a{flex:1;display:block;text-align:center;padding:14px;border-radius:12px;text-decoration:none;font-size:15px;font-weight:600}
.ba{background:#fff;color:#333;border:1px solid #ddd}
.ha{background:#333;color:#fff}
</style>
</head>
<body>
<div class="hd"><a href="javascript:history.back()">←</a><h1>学习工具</h1></div>
<div class="main">

</html>
