<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 硬核工具站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: #0f172a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            width: 100%;
            max-width: 400px;
            background: #1e293b;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .auth-header p {
            color: #94a3b8;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #cbd5e1;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #0f172a;
            color: #fff;
            font-size: 16px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #3b82f6;
            color: #fff;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
        .auth-switch {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #94a3b8;
        }
        .auth-switch button {
            background: none;
            border: none;
            color: #3b82f6;
            text-decoration: underline;
            cursor: pointer;
            font-size: 14px;
        }
        .message {
            margin: 16px 0;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .message.success {
            background: #065f46;
            color: #a7f3d0;
            display: block;
        }
        .message.error {
            background: #991b1b;
            color: #fecaca;
            display: block;
        }
        .dashboard {
            display: none;
            text-align: center;
        }
        .dashboard h2 {
            margin-bottom: 16px;
        }
        .dashboard p {
            color: #94a3b8;
            margin-bottom: 24px;
        }
        .btn-danger {
            background: #dc2626;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="auth-container" id="authForm">
        <!-- 登录表单 -->
        <div id="loginForm">
            <div class="auth-header">
                <h1>欢迎回来</h1>
                <p>登录你的账号继续使用</p>
            </div>
            <div class="message" id="loginMessage"></div>
            <div class="form-group">
                <label for="loginEmail">邮箱地址</label>
                <input type="email" id="loginEmail" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">密码</label>
                <input type="password" id="loginPassword" placeholder="输入密码" required>
            </div>
            <button class="btn btn-primary" onclick="handleLogin()">登录</button>
            <div class="auth-switch">
                还没有账号？<button onclick="showRegister()">立即注册</button>
            </div>
        </div>

        <!-- 注册表单 -->
        <div id="registerForm" style="display: none;">
            <div class="auth-header">
                <h1>创建账号</h1>
                <p>注册后即可解锁全部功能</p>
            </div>
            <div class="message" id="registerMessage"></div>
            <div class="form-group">
                <label for="registerEmail">邮箱地址</label>
                <input type="email" id="registerEmail" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="registerPassword">设置密码</label>
                <input type="password" id="registerPassword" placeholder="至少6位字符" required>
            </div>
            <button class="btn btn-primary" onclick="handleRegister()">注册</button>
            <div class="auth-switch">
                已有账号？<button onclick="showLogin()">立即登录</button>
            </div>
        </div>

        <!-- 登录后的仪表盘 -->
        <div id="dashboard" class="dashboard">
            <h2>登录成功！🎉</h2>
            <p id="userEmail"></p>
            <button class="btn btn-danger" onclick="handleLogout()">退出登录</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 已填入你的 Supabase 项目信息
        const SUPABASE_URL = "https://czispkecvokqsvomquqo.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6aXNwa2Vjdm9rcXN2b21xdXFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxODc4MDEsImV4cCI6MjA5Mjc2MzgwMX0.0S1DcKYE1aVjaZsAKURzGdd4X2G2q5o570Q6pUiOWp0";

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 页面加载时检查用户登录状态
        window.onload = async function() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                showDashboard(user);
            }
        };

        // 显示登录表单
        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('dashboard').style.display = 'none';
        }

        // 显示注册表单
        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
        }

        // 显示仪表盘
        function showDashboard(user) {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('userEmail').textContent = `当前登录：${user.email}`;
        }

        // 处理登录
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const messageEl = document.getElementById('loginMessage');

            messageEl.className = 'message';
            messageEl.textContent = '';

            if (!email || !password) {
                messageEl.className = 'message error';
                messageEl.textContent = '请填写邮箱和密码';
                return;
            }

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                messageEl.className = 'message error';
                messageEl.textContent = error.message;
            } else {
                messageEl.className = 'message success';
                messageEl.textContent = '登录成功！正在跳转...';
                setTimeout(() => showDashboard(data.user), 1000);
            }
        }

        // 处理注册
        async function handleRegister() {
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const messageEl = document.getElementById('registerMessage');

            messageEl.className = 'message';
            messageEl.textContent = '';

            if (!email || !password) {
                messageEl.className = 'message error';
                messageEl.textContent = '请填写邮箱和密码';
                return;
            }

            if (password.length < 6) {
                messageEl.className = 'message error';
                messageEl.textContent = '密码长度至少6位';
                return;
            }

            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    emailRedirectTo: "https://ddaa.online/login.html"
                }
            });

            if (error) {
                messageEl.className = 'message error';
                messageEl.textContent = error.message;
            } else {
                messageEl.className = 'message success';
                messageEl.textContent = '注册成功！请前往邮箱点击验证链接';
            }
        }

        // 处理退出登录
        async function handleLogout() {
            await supabase.auth.signOut();
            showLogin();
        }
    </script>
</body>
</html>
