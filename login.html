<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录系统完整版</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:360px;
    background:#1e293b;
    padding:25px;
    border-radius:12px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #334155;
    background:#0f172a;
    color:#fff;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:#fff;
    cursor:pointer;
}

button:hover{background:#2563eb;}

.secondary{
    background:#64748b;
}

.danger{
    background:#ef4444;
}

.hidden{
    display:none;
}

.msg{
    margin-top:10px;
    font-size:14px;
    color:#fbbf24;
}

.center{
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

    <!-- 登录 -->
    <div id="loginBox">
        <h2 class="center">登录</h2>

        <input id="loginEmail" placeholder="邮箱">
        <input id="loginPass" type="password" placeholder="密码">

        <button type="button" onclick="login()">登录</button>
        <button type="button" class="secondary" onclick="showRegister()">去注册</button>

        <div id="loginMsg" class="msg"></div>
    </div>

    <!-- 注册 -->
    <div id="registerBox" class="hidden">
        <h2 class="center">注册</h2>

        <input id="regEmail" placeholder="邮箱">
        <input id="regPass" type="password" placeholder="密码">

        <button type="button" onclick="register()">注册</button>
        <button type="button" class="secondary" onclick="showLogin()">去登录</button>

        <div id="regMsg" class="msg"></div>
    </div>

    <!-- 主页 -->
    <div id="dashBox" class="hidden center">
        <h2>登录成功 🎉</h2>
        <p id="userEmail"></p>
        <button class="danger" onclick="logout()">退出登录</button>
    </div>

</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>

// ===== 初始化 Supabase =====
const SUPABASE_URL = "https://czispkecvokqsvomquqo.supabase.co";
const SUPABASE_KEY = "你的anon key";

const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

// ===== 页面加载检查登录状态 =====
window.onload = async () => {
    const { data } = await supabase.auth.getSession();

    if (data.session?.user) {
        showDash(data.session.user);
    } else {
        showLogin();
    }
};

// ===== 监听登录状态变化（核心）=====
supabase.auth.onAuthStateChange((event, session) => {
    if (session?.user) {
        showDash(session.user);
    } else {
        showLogin();
    }
});

// ================= UI切换 =================
function showLogin(){
    document.getElementById("loginBox").classList.remove("hidden");
    document.getElementById("registerBox").classList.add("hidden");
    document.getElementById("dashBox").classList.add("hidden");
}

function showRegister(){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("registerBox").classList.remove("hidden");
    document.getElementById("dashBox").classList.add("hidden");
}

function showDash(user){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("registerBox").classList.add("hidden");
    document.getElementById("dashBox").classList.remove("hidden");

    document.getElementById("userEmail").innerText = user.email;
}

// ================= 登录 =================
async function login(){
    let email = document.getElementById("loginEmail").value;
    let pass = document.getElementById("loginPass").value;

    let { error } = await supabase.auth.signInWithPassword({
        email,
        password: pass
    });

    if(error){
        document.getElementById("loginMsg").innerText = error.message;
    }
}

// ================= 注册 =================
async function register(){
    let email = document.getElementById("regEmail").value;
    let pass = document.getElementById("regPass").value;

    let { error } = await supabase.auth.signUp({
        email,
        password: pass
    });

    if(error){
        document.getElementById("regMsg").innerText = error.message;
    }else{
        document.getElementById("regMsg").innerText =
        "注册成功，请检查邮箱（如果开启验证）";
    }
}

// ================= 退出 =================
async function logout(){
    await supabase.auth.signOut();
}

</script>

</body>
</html>
