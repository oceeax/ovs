<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>稳定登录系统</title>
<style>
body{margin:0;background:#0f172a;color:#fff;font-family:system-ui;display:flex;justify-content:center;align-items:center;height:100vh}
.box{width:380px;background:#1e293b;padding:28px;border-radius:12px}
h2{text-align:center;margin-bottom:20px}
input{width:100%;padding:12px;margin:8px 0;border-radius:6px;border:1px solid #334155;background:#0f172a;color:#fff}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:6px;background:#2563eb;color:#fff;cursor:pointer}
button:disabled{background:#475569;cursor:not-allowed;}
.msg{padding:10px;border-radius:6px;margin-top:10px;display:none;font-size:14px;text-align:center}
.err{background:#7f1d1d;display:block}
.ok{background:#065f46;display:block}
.tip{text-align:center;margin-top:10px;color:#94a3b8;font-size:14px;display:flex;justify-content:center;gap:16px;align-items:center}
/* 统一链接按钮样式：和注册/登录按钮完全一致 */
.tip button{
    background:none;
    border:none;
    color:#3b82f6;
    cursor:pointer;
    padding:0;
    margin:0;
    width:auto;
    font-size:14px;
    font-family:inherit;
}
.hidden{display:none}
</style>
</head>
<body>

<div class="box">
    <!-- 登录 -->
    <div id="loginBox">
        <h2>登录</h2>
        <div id="loginMsg" class="msg"></div>
        <input id="loginEmail" placeholder="邮箱">
        <input id="loginPwd" type="password" placeholder="密码">
        <button id="loginBtn" onclick="doLogin()">登录</button>
        <div class="tip">
            <span>没有账号？</span>
            <button onclick="showReg()">去注册</button>
            <button onclick="location.reload()">刷新</button>
        </div>
    </div>

    <!-- 注册 -->
    <div id="regBox" class="hidden">
        <h2>注册</h2>
        <div id="regMsg" class="msg"></div>
        <input id="regEmail" placeholder="邮箱">
        <input id="regPwd" type="password" placeholder="密码">
        <button id="regBtn" onclick="doReg()">注册</button>
        <div class="tip">
            <span>已有账号？</span>
            <button onclick="showLogin()">去登录</button>
            <button onclick="location.reload()">刷新</button>
        </div>
    </div>

    <!-- 成功 -->
    <div id="userBox" class="hidden" style="text-align:center">
        <h2>登录成功</h2>
        <p id="userMail" style="color:#94a3b8"></p>
        <p style="color:#94a3b8;font-size:14px;margin-top:10px">正在跳转到首页...</p>
        <p id="retryText" style="color:#f87171;font-size:13px;margin-top:12px;"></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const loginBox = document.getElementById('loginBox');
const regBox = document.getElementById('regBox');
const userBox = document.getElementById('userBox');
const loginMsg = document.getElementById('loginMsg');
const regMsg = document.getElementById('regMsg');
const loginEmail = document.getElementById('loginEmail');
const loginPwd = document.getElementById('loginPwd');
const regEmail = document.getElementById('regEmail');
const regPwd = document.getElementById('regPwd');
const userMail = document.getElementById('userMail');
const loginBtn = document.getElementById('loginBtn');
const regBtn = document.getElementById('regBtn');
const retryText = document.getElementById('retryText');

const targetUrl = "/h/h8/j9/jw/sd.html";
let reloadTimes = 0;
const maxTry = 3;

const sb = supabase.createClient(
    "https://czispkecvokqsvomquqo.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6aXNwa2Vjdm9rcXN2b21xdXFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxODc4MDEsImV4cCI6MjA5Mjc2MzgwMX0.0S1DcKYE1aVjaZsAKURzGdd4X2G2q5o570Q6pUiOWp0"
);

async function kickAllOtherSessions(){const{data:{sessions}}=await sb.auth.getSessions();if(!sessions)return;const{data:{session}}=await sb.auth.getSession();const cid=session?.id;for(let s of sessions)if(s.id!==cid)await sb.auth.signOut({scope:"others"})}
sb.auth.onAuthStateChange(e=>{if(e==="signed_out")location.href="login.html"});

function showLogin(){loginBox.classList.remove("hidden");regBox.classList.add("hidden");userBox.classList.add("hidden")}
function showReg(){loginBox.classList.add("hidden");regBox.classList.remove("hidden");userBox.classList.add("hidden")}
function showUser(email){
    loginBox.classList.add("hidden");
    regBox.classList.add("hidden");
    userBox.classList.remove("hidden");
    userMail.innerText = email || "";
    startJumpTask();
}

function startJumpTask(){
    window.location.href = targetUrl;
    setTimeout(()=>{
        if(location.pathname.indexOf("login.html")!==-1){
            reloadTimes++;
            if(reloadTimes <= maxTry){
                retryText.innerText = `跳转失败，自动刷新 ${reloadTimes}/${maxTry}`;
                setTimeout(()=>location.reload(),1500);
            }else{
                retryText.innerText = "已重试3次，请手动点击刷新";
            }
        }
    },1800);
}

let regCooldown=false;const COOLDOWN=60;
async function doReg(){
    if(regCooldown){regMsg.className="msg err";regMsg.innerText="请一分钟后再试";return}
    let e=regEmail.value.trim(),p=regPwd.value.trim();
    if(!e){regMsg.className="msg err";regMsg.innerText="请输入邮箱";return}
    if(p.length<6){regMsg.className="msg err";regMsg.innerText="密码至少6位";return}
    regBtn.disabled=true;
    const{error}=await sb.auth.signUp({email:e,password:p,options:{emailRedirectTo:"https://ddaa.online/login.html"}});
    regBtn.disabled=false;
    if(error){
        if(error.message.includes("rate limit")){regMsg.className="msg err";regMsg.innerText="请一分钟后再试";regCooldown=true;setTimeout(()=>regCooldown=false,COOLDOWN*1000)}
        else{regMsg.className="msg err";regMsg.innerText=error.message}
    }else{regMsg.className="msg ok";regMsg.innerText="注册成功！请前往邮箱验证"}
}

async function doLogin(){
    let e=loginEmail.value.trim(),p=loginPwd.value.trim();
    loginMsg.style.display="none";
    if(!e){loginMsg.className="msg err";loginMsg.innerText="请输入邮箱";return}
    if(!p){loginMsg.className="msg err";loginMsg.innerText="请输入密码";return}
    loginBtn.disabled=true;
    try{
        const{data,error}=await sb.auth.signInWithPassword({email:e,password:p});
        if(error){loginMsg.className="msg err";loginMsg.innerText="用户不存在或密码错误"}
        else{
            await kickAllOtherSessions();
            loginMsg.className="msg ok";
            loginMsg.innerText="登录成功";
            showUser(data.user.email);
        }
    }catch{loginMsg.className="msg err";loginMsg.innerText="请求异常，请稍后重试"}
    loginBtn.disabled=false;
}

window.onload = async () => {
    const {data} = await sb.auth.getSession();
    if(data.session?.user){
        showUser(data.session.user.email);
    }
};
</script>

</body>
</html>
