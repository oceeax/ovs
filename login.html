<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>稳定登录系统</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:360px;
    background:#1e293b;
    padding:25px;
    border-radius:12px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #334155;
    background:#0f172a;
    color:#fff;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:#fff;
    cursor:pointer;
}

button:hover{background:#2563eb;}

.hidden{display:none;}

.msg{
    margin-top:10px;
    font-size:14px;
    padding:8px;
    border-radius:6px;
    background:#1e40af;
}
</style>
</head>

<body>

<div class="box">

    <!-- 登录 -->
    <div id="loginBox">
        <h2>登录</h2>

        <input id="email" placeholder="邮箱">
        <input id="pass" type="password" placeholder="密码">

        <button id="loginBtn">登录</button>
        <button id="toReg">去注册</button>

        <div id="msg" class="msg">等待操作...</div>
    </div>

    <!-- 注册 -->
    <div id="regBox" class="hidden">
        <h2>注册</h2>

        <input id="remail" placeholder="邮箱">
        <input id="rpass" type="password" placeholder="密码">

        <button id="regBtn">注册</button>
        <button id="toLogin">去登录</button>

        <div id="msg2" class="msg">等待操作...</div>
    </div>

    <!-- 成功 -->
    <div id="dashBox" class="hidden">
        <h2>登录成功 🎉</h2>
        <p id="user"></p>
        <button id="logoutBtn">退出</button>
    </div>

</div>

<!-- ⭐ 稳定CDN（重点） -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

// ===== 检查SDK =====
if(!window.supabase){
    alert("❌ Supabase未加载成功，请检查网络或CDN");
}

// ===== 初始化 =====
const supabase = window.supabase.createClient(
    "https://czispkecvokqsvomquqo.supabase.co",
    "你的anon key"
);

// ===== UI =====
function showLogin(){
    loginBox.classList.remove("hidden");
    regBox.classList.add("hidden");
    dashBox.classList.add("hidden");
}

function showReg(){
    loginBox.classList.add("hidden");
    regBox.classList.remove("hidden");
    dashBox.classList.add("hidden");
}

function showDash(user){
    loginBox.classList.add("hidden");
    regBox.classList.add("hidden");
    dashBox.classList.remove("hidden");
    user.innerText = user.email;
}

// ===== 登录 =====
loginBtn.onclick = async () => {
    let { error } = await supabase.auth.signInWithPassword({
        email: email.value,
        password: pass.value
    });

    msg.innerText = error ? "❌ "+error.message : "✔ 登录成功";
};

// ===== 注册 =====
regBtn.onclick = async () => {
    let { error } = await supabase.auth.signUp({
        email: remail.value,
        password: rpass.value
    });

    msg2.innerText = error ? "❌ "+error.message : "✔ 注册成功";
};

// ===== 切换 =====
toReg.onclick = showReg;
toLogin.onclick = showLogin;

// ===== 退出 =====
logoutBtn.onclick = async () => {
    await supabase.auth.signOut();
    showLogin();
};

// ===== 状态检测 =====
window.onload = async () => {
    const { data } = await supabase.auth.getSession();

    if(data.session?.user){
        showDash(data.session.user);
    }else{
        showLogin();
    }
};

</script>

</body>
</html>
