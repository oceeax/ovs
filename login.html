<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录</title>

<style>
body{
    margin:0;
    background:#0f172a;
    color:#fff;
    font-family:system-ui;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    width:320px;
    background:#1e293b;
    padding:20px;
    border-radius:10px;
}
input,button{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:6px;
    border:none;
}
input{
    background:#0f172a;
    color:#fff;
    border:1px solid #334155;
}
button{
    background:#2563eb;
    color:#fff;
    cursor:pointer;
}
.msg{
    text-align:center;
    margin-top:10px;
    display:none;
}
</style>
</head>

<body>

<div class="box">
    <h3 style="text-align:center">登录</h3>

    <div id="msg" class="msg"></div>

    <input id="email" placeholder="邮箱">
    <input id="pwd" type="password" placeholder="密码">

    <button onclick="login()">登录</button>
    <button onclick="register()">注册</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

// 🔥 你的目标页面（不变）
const TARGET = "/h/h8/j9/jw/sd.html";

// ✅ Supabase（已填好）
const sb = supabase.createClient(
    "https://czispkecvokqsvomquqo.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6aXNwa2Vjdm9rcXN2b21xdXFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxODc4MDEsImV4cCI6MjA5Mjc2MzgwMX0.0S1DcKYE1aVjaZsAKURzGdd4X2G2q5o570Q6pUiOWp0"
);

const msgBox = document.getElementById("msg");

function show(text,color="red"){
    msgBox.innerText = text;
    msgBox.style.display = "block";
    msgBox.style.color = color;
}

// 登录
async function login(){
    let e = email.value.trim();
    let p = pwd.value.trim();

    if(!e) return show("请输入邮箱");
    if(!p) return show("请输入密码");

    const {error} = await sb.auth.signInWithPassword({email:e,password:p});

    if(error){
        show("账号或密码错误");
    }else{
        show("登录成功","lightgreen");
        window.location.href = TARGET; // ✅ 直接跳
    }
}

// 注册
async function register(){
    let e = email.value.trim();
    let p = pwd.value.trim();

    if(!e) return show("请输入邮箱");
    if(p.length < 6) return show("密码至少6位");

    const {error} = await sb.auth.signUp({email:e,password:p});

    if(error){
        show(error.message);
    }else{
        show("注册成功，请去邮箱验证","lightgreen");
    }
}

</script>

</body>
</html>
