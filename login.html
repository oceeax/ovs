<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>稳定登录系统</title>

<style>
body{margin:0;background:#0f172a;color:#fff;font-family:system-ui;display:flex;justify-content:center;align-items:center;height:100vh}
.box{width:380px;background:#1e293b;padding:28px;border-radius:12px}
h2{text-align:center;margin-bottom:20px}
input{width:100%;padding:12px;margin:8px 0;border-radius:6px;border:1px solid #334155;background:#0f172a;color:#fff}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:6px;background:#2563eb;color:#fff;cursor:pointer}
button:hover{background:#1d4ed8}
.msg{padding:10px;border-radius:6px;margin-top:10px;display:none;font-size:14px}
.err{background:#7f1d1d;display:block}
.ok{background:#065f46;display:block}
.tip{text-align:center;margin-top:10px;color:#94a3b8;font-size:14px}
.tip button{background:none;border:none;color:#3b82f6;cursor:pointer}
.hidden{display:none}
</style>
</head>

<body>

<div class="box">

<!-- 登录 -->
<div id="loginBox">
<h2>登录</h2>

<div id="loginMsg" class="msg"></div>

<input id="loginEmail" placeholder="邮箱">
<input id="loginPwd" type="password" placeholder="密码">

<button onclick="doLogin()">登录</button>

<div class="tip">没有账号？ <button onclick="showReg()">去注册</button></div>
</div>

<!-- 注册 -->
<div id="regBox" class="hidden">
<h2>注册</h2>

<div id="regMsg" class="msg"></div>

<input id="regEmail" placeholder="邮箱">
<input id="regPwd" type="password" placeholder="密码">

<button onclick="doReg()">注册</button>

<div class="tip">已有账号？ <button onclick="showLogin()">去登录</button></div>
</div>

<!-- 成功 -->
<div id="userBox" class="hidden" style="text-align:center">
<h2>登录成功</h2>
<p id="userMail" style="color:#94a3b8"></p>
<button onclick="doLogout()">退出</button>
</div>

</div>

<!-- CDN（稳定版） -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// ===== 防炸检查 =====
if(!window.supabase){
    alert("Supabase加载失败（CDN问题）");
}

// ===== 初始化 =====
const sb = window.supabase.createClient(
    "https://czispkecvokqsvomquqo.supabase.co",
    "你的anon key"
);

// ===== 切换 =====
function showLogin(){
    loginBox.classList.remove("hidden");
    regBox.classList.add("hidden");
    userBox.classList.add("hidden");
}

function showReg(){
    loginBox.classList.add("hidden");
    regBox.classList.remove("hidden");
    userBox.classList.add("hidden");
}

function showUser(email){
    loginBox.classList.add("hidden");
    regBox.classList.add("hidden");
    userBox.classList.remove("hidden");

    if(email) userMail.innerText = email;
}

// ===== 注册（已修复）=====
async function doReg(){

    let email = regEmail.value.trim();
    let password = regPwd.value.trim();

    regMsg.style.display="none";

    if(!email){
        regMsg.className="msg err";
        regMsg.innerText="请输入邮箱";
        return;
    }

    if(password.length<6){
        regMsg.className="msg err";
        regMsg.innerText="密码至少6位";
        return;
    }

    const { error } = await sb.auth.signUp({
        email,
        password
    });

    if(error){
        regMsg.className="msg err";
        regMsg.innerText=error.message;
    }else{
        regMsg.className="msg ok";
        regMsg.innerText="注册成功，请去邮箱验证";
    }
}

// ===== 登录（已修复）=====
async function doLogin(){

    let email = loginEmail.value.trim();
    let password = loginPwd.value.trim();

    loginMsg.style.display="none";

    const { data, error } = await sb.auth.signInWithPassword({
        email,
        password   // 🔥 修复点
    });

    if(error){
        loginMsg.className="msg err";
        loginMsg.innerText=error.message;
    }else{
        showUser(data.user.email);
    }
}

// ===== 退出 =====
async function doLogout(){
    await sb.auth.signOut();
    showLogin();
}

// ===== 初始化检测 =====
window.onload = async () => {
    const { data } = await sb.auth.getSession();
    if(data.session?.user){
        showUser(data.session.user.email);
    }
};

</script>

</body>
</html>
