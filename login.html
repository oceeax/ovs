<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录系统</title>

<style>
body{
    margin:0;
    background:#0f172a;
    color:#fff;
    font-family:system-ui;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    width:360px;
    background:#1e293b;
    padding:25px;
    border-radius:12px;
}
h2{text-align:center;margin-bottom:15px}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #334155;
    background:#0f172a;
    color:#fff;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#2563eb;
    color:#fff;
    cursor:pointer;
}
button:disabled{
    background:#475569;
}

.msg{
    padding:10px;
    border-radius:6px;
    margin-top:10px;
    text-align:center;
    display:none;
    font-size:14px;
}
.err{background:#7f1d1d}
.ok{background:#065f46}

.tip{
    text-align:center;
    margin-top:10px;
    font-size:14px;
    color:#94a3b8;
}
.tip span{
    cursor:pointer;
    color:#3b82f6;
    margin:0 6px;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="box">

<!-- 登录 -->
<div id="loginBox">
    <h2>登录</h2>
    <div id="loginMsg" class="msg"></div>
    <input id="loginEmail" placeholder="邮箱">
    <input id="loginPwd" type="password" placeholder="密码">
    <button onclick="login()">登录</button>

    <div class="tip">
        <span onclick="showReg()">注册</span>
        <span onclick="location.reload()">刷新</span>
    </div>
</div>

<!-- 注册 -->
<div id="regBox" class="hidden">
    <h2>注册</h2>
    <div id="regMsg" class="msg"></div>
    <input id="regEmail" placeholder="邮箱">
    <input id="regPwd" type="password" placeholder="密码">
    <button onclick="register()">注册</button>

    <div class="tip">
        <span onclick="showLogin()">登录</span>
        <span onclick="location.reload()">刷新</span>
    </div>
</div>

<!-- 成功 -->
<div id="okBox" class="hidden" style="text-align:center">
    <h2>登录成功</h2>
    <p id="info" style="color:#94a3b8"></p>
    <p id="retry" style="color:#f87171;font-size:13px;margin-top:10px;"></p>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

// 🔥 你的跳转地址（保持不变）
const TARGET = "/h/h8/j9/jw/sd.html";

// Supabase
const sb = supabase.createClient(
    "你的supabase地址",
    "你的anon key"
);

// UI
const loginBox = document.getElementById("loginBox");
const regBox = document.getElementById("regBox");
const okBox = document.getElementById("okBox");

function msg(el,type,text){
    el.className = "msg " + type;
    el.innerText = text;
    el.style.display = "block";
}

function showLogin(){
    loginBox.classList.remove("hidden");
    regBox.classList.add("hidden");
    okBox.classList.add("hidden");
}

function showReg(){
    loginBox.classList.add("hidden");
    regBox.classList.remove("hidden");
    okBox.classList.add("hidden");
}

function showOK(email){
    loginBox.classList.add("hidden");
    regBox.classList.add("hidden");
    okBox.classList.remove("hidden");
    document.getElementById("info").innerText = email;
    jump();
}

// 🔥 跳转逻辑（核心稳定版）
let count = 0;
function jump(){
    window.location.href = TARGET;

    let t = setInterval(()=>{
        count++;

        // 已离开页面 = 成功
        if(!location.href.includes("login")){
            clearInterval(t);
        }

        if(count >= 3){
            clearInterval(t);
            document.getElementById("retry").innerText = "跳转失败，返回登录";
            localStorage.removeItem("ok");
            setTimeout(showLogin,1500);
        }else{
            document.getElementById("retry").innerText = `跳转失败，重试 ${count}/3`;
            location.reload();
        }

    },2000);
}

// 注册
async function register(){
    let e = regEmail.value.trim();
    let p = regPwd.value.trim();

    if(!e) return msg(regMsg,"err","请输入邮箱");
    if(p.length < 6) return msg(regMsg,"err","密码至少6位");

    try{
        const {error} = await sb.auth.signUp({email:e,password:p});
        if(error){
            msg(regMsg,"err",error.message);
        }else{
            msg(regMsg,"ok","注册成功，请验证邮箱");
        }
    }catch{
        msg(regMsg,"err","网络异常");
    }
}

// 登录
async function login(){
    let e = loginEmail.value.trim();
    let p = loginPwd.value.trim();

    if(!e) return msg(loginMsg,"err","请输入邮箱");
    if(!p) return msg(loginMsg,"err","请输入密码");

    try{
        const {data,error} = await sb.auth.signInWithPassword({email:e,password:p});

        if(error){
            msg(loginMsg,"err","账号或密码错误");
        }else{
            localStorage.setItem("ok","1");
            showOK(data.user.email);
        }

    }catch{
        msg(loginMsg,"err","服务器异常");
    }
}

// 自动登录（关键）
window.onload = async ()=>{
    const {data} = await sb.auth.getSession();

    if(data.session || localStorage.getItem("ok")){
        showOK(data.session?.user?.email || "已登录");
    }
};

</script>

</body>
</html>
