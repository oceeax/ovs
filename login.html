<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录系统</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0f172a;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.box{
    width:360px;
    background:#1e293b;
    padding:25px;
    border-radius:12px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #334155;
    background:#0f172a;
    color:#fff;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:#fff;
    cursor:pointer;
}

button:hover{background:#2563eb;}

.hidden{display:none;}

.msg{margin-top:10px;font-size:14px;}

.dashboard{
    text-align:center;
}
</style>
</head>

<body>

<div class="box">

    <!-- 登录 -->
    <div id="loginBox">
        <h2>登录</h2>
        <input id="loginEmail" placeholder="邮箱">
        <input id="loginPass" type="password" placeholder="密码">
        <button onclick="login()">登录</button>
        <button onclick="showRegister()" style="background:#64748b">去注册</button>
        <div id="loginMsg" class="msg"></div>
    </div>

    <!-- 注册 -->
    <div id="registerBox" class="hidden">
        <h2>注册</h2>
        <input id="regEmail" placeholder="邮箱">
        <input id="regPass" type="password" placeholder="密码">
        <button onclick="register()">注册</button>
        <button onclick="showLogin()" style="background:#64748b">去登录</button>
        <div id="regMsg" class="msg"></div>
    </div>

    <!-- 主页 -->
    <div id="dashBox" class="hidden dashboard">
        <h2>登录成功 🎉</h2>
        <p id="userEmail"></p>
        <button onclick="logout()" style="background:#ef4444">退出登录</button>
    </div>

</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
// ===== Supabase 初始化 =====
const SUPABASE_URL = "https://czispkecvokqsvomquqo.supabase.co";
const SUPABASE_KEY = "你的anon key";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== 页面状态监听（核心）=====
supabase.auth.onAuthStateChange((event, session) => {
    if (session?.user) {
        showDash(session.user);
    } else {
        showLogin();
    }
});

// ===== 初始化检测 =====
window.onload = async () => {
    const { data } = await supabase.auth.getSession();
    if (data.session?.user) {
        showDash(data.session.user);
    }
};

// ===== 登录 =====
async function login(){
    let email = loginEmail.value;
    let pass = loginPass.value;

    let { data, error } = await supabase.auth.signInWithPassword({
        email,
        password: pass
    });

    if(error){
        loginMsg.innerText = error.message;
    }else{
        loginMsg.innerText = "登录成功";
    }
}

// ===== 注册 =====
async function register(){
    let email = regEmail.value;
    let pass = regPass.value;

    let { error } = await supabase.auth.signUp({
        email,
        password: pass
    });

    if(error){
        regMsg.innerText = error.message;
    }else{
        regMsg.innerText = "注册成功，请检查邮箱（如开启验证）";
    }
}

// ===== 退出 =====
async function logout(){
    await supabase.auth.signOut();
}

// ===== UI切换 =====
function showLogin(){
    loginBox.classList.remove("hidden");
    registerBox.classList.add("hidden");
    dashBox.classList.add("hidden");
}

function showRegister(){
    loginBox.classList.add("hidden");
    registerBox.classList.remove("hidden");
    dashBox.classList.add("hidden");
}

function showDash(user){
    loginBox.classList.add("hidden");
    registerBox.classList.add("hidden");
    dashBox.classList.remove("hidden");
    userEmail.innerText = user.email;
}
</script>

</body>
</html>
