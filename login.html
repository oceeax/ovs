<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录系统（带调试提示版）</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:360px;
    background:#1e293b;
    padding:25px;
    border-radius:12px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #334155;
    background:#0f172a;
    color:#fff;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:#fff;
    cursor:pointer;
}

button:hover{background:#2563eb;}

.secondary{background:#64748b;}

.hidden{display:none;}

.msg{
    margin-top:10px;
    font-size:14px;
    padding:8px;
    border-radius:6px;
}

.success{background:#065f46;}
.error{background:#7f1d1d;}
.warn{background:#78350f;}
.info{background:#1e40af;}

.center{text-align:center;}
</style>
</head>

<body>

<div class="container">

    <!-- 登录 -->
    <div id="loginBox">
        <h2 class="center">登录</h2>

        <input id="loginEmail" placeholder="邮箱">
        <input id="loginPass" type="password" placeholder="密码">

        <button id="btnLogin" type="button">登录</button>
        <button id="btnToRegister" type="button" class="secondary">去注册</button>

        <div id="loginMsg" class="msg info">等待操作...</div>
    </div>

    <!-- 注册 -->
    <div id="registerBox" class="hidden">
        <h2 class="center">注册</h2>

        <input id="regEmail" placeholder="邮箱">
        <input id="regPass" type="password" placeholder="密码">

        <button id="btnRegister" type="button">注册</button>
        <button id="btnToLogin" type="button" class="secondary">去登录</button>

        <div id="regMsg" class="msg info">等待操作...</div>
    </div>

    <!-- 主页 -->
    <div id="dashBox" class="hidden center">
        <h2>登录成功 🎉</h2>
        <p id="userEmail"></p>
        <button id="btnLogout" class="secondary">退出登录</button>
    </div>

</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>

// ===================== 安全初始化检测 =====================
if(!window.supabase){
    alert("❌ Supabase SDK未加载，页面无法运行！");
}

// ===================== 初始化 =====================
const SUPABASE_URL = "https://czispkecvokqsvomquqo.supabase.co";
const SUPABASE_KEY = "你的anon key";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===================== UI工具 =====================
function msg(id, text, type="info"){
    const el = document.getElementById(id);
    el.className = "msg " + type;
    el.innerText = text;
}

// ===================== 页面切换 =====================
function showLogin(){
    console.log("切换：登录页面");

    loginBox.style.display = "block";
    registerBox.style.display = "none";
    dashBox.style.display = "none";

    msg("loginMsg","已进入登录页面","info");
}

function showRegister(){
    console.log("切换：注册页面");

    loginBox.style.display = "none";
    registerBox.style.display = "block";
    dashBox.style.display = "none";

    msg("regMsg","已进入注册页面","info");
}

function showDash(user){
    loginBox.style.display = "none";
    registerBox.style.display = "none";
    dashBox.style.display = "block";

    userEmail.innerText = "当前用户：" + user.email;
}

// ===================== 登录 =====================
async function login(){
    try{
        let email = loginEmail.value;
        let pass = loginPass.value;

        if(!email || !pass){
            msg("loginMsg","❌ 请填写完整信息","error");
            return;
        }

        msg("loginMsg","正在登录...","warn");

        const { data, error } = await supabase.auth.signInWithPassword({
            email,
            password: pass
        });

        if(error){
            msg("loginMsg","❌ 登录失败："+error.message,"error");
            return;
        }

        msg("loginMsg","✔ 登录成功","success");

    }catch(e){
        msg("loginMsg","❌ 未知错误","error");
        console.error(e);
    }
}

// ===================== 注册 =====================
async function register(){
    try{
        let email = regEmail.value;
        let pass = regPass.value;

        if(!email || !pass){
            msg("regMsg","❌ 信息不完整","error");
            return;
        }

        msg("regMsg","正在注册...","warn");

        const { error } = await supabase.auth.signUp({
            email,
            password: pass
        });

        if(error){
            msg("regMsg","❌ 注册失败："+error.message,"error");
            return;
        }

        msg("regMsg","✔ 注册成功，请查邮箱验证","success");

    }catch(e){
        msg("regMsg","❌ 系统错误","error");
    }
}

// ===================== 退出 =====================
async function logout(){
    await supabase.auth.signOut();
    showLogin();
}

// ===================== 事件绑定（关键稳定） =====================
document.addEventListener("DOMContentLoaded", () => {

    const loginBox = document.getElementById("loginBox");
    const registerBox = document.getElementById("registerBox");
    const dashBox = document.getElementById("dashBox");

    // 按钮绑定
    btnLogin.addEventListener("click", login);
    btnRegister.addEventListener("click", register);
    btnLogout.addEventListener("click", logout);

    btnToRegister.addEventListener("click", () => {
        console.log("点击：去注册");
        showRegister();
    });

    btnToLogin.addEventListener("click", () => {
        console.log("点击：去登录");
        showLogin();
    });

});

// ===================== 状态监听 =====================
supabase.auth.onAuthStateChange((event, session) => {
    if(session?.user){
        showDash(session.user);
    }else{
        showLogin();
    }
});

// ===================== 初始化检测 =====================
window.onload = async () => {
    const { data } = await supabase.auth.getSession();

    if(data.session?.user){
        showDash(data.session.user);
    }else{
        showLogin();
    }
};

</script>

</body>
</html>
