<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>稳定登录系统</title>

<style>
body{margin:0;background:#0f172a;color:#fff;font-family:system-ui;display:flex;justify-content:center;align-items:center;height:100vh}
.box{width:380px;background:#1e293b;padding:28px;border-radius:12px}
h2{text-align:center;margin-bottom:20px}
input{width:100%;padding:12px;margin:8px 0;border-radius:6px;border:1px solid #334155;background:#0f172a;color:#fff}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:6px;background:#2563eb;color:#fff;cursor:pointer}
button:disabled{background:#475569;cursor:not-allowed;}
.msg{padding:10px;border-radius:6px;margin-top:10px;font-size:14px;text-align:center;display:none}
.err{background:#7f1d1d}
.ok{background:#065f46}
.tip{text-align:center;margin-top:10px;color:#94a3b8;font-size:14px;display:flex;justify-content:center;gap:16px;align-items:center}
.tip button{background:none;border:none;color:#3b82f6;cursor:pointer}
.hidden{display:none}
</style>
</head>

<body>

<div class="box">

<!-- 登录 -->
<div id="loginBox">
    <h2>登录</h2>
    <div id="loginMsg" class="msg"></div>
    <input id="loginEmail" placeholder="邮箱">
    <input id="loginPwd" type="password" placeholder="密码">
    <button id="loginBtn" onclick="doLogin()">登录</button>
    <div class="tip">
        <span>没有账号？</span>
        <button onclick="showReg()">注册</button>
        <button onclick="location.reload()">刷新</button>
    </div>
</div>

<!-- 注册 -->
<div id="regBox" class="hidden">
    <h2>注册</h2>
    <div id="regMsg" class="msg"></div>
    <input id="regEmail" placeholder="邮箱">
    <input id="regPwd" type="password" placeholder="密码">
    <button id="regBtn" onclick="doReg()">注册</button>
    <div class="tip">
        <span>已有账号？</span>
        <button onclick="showLogin()">登录</button>
        <button onclick="location.reload()">刷新</button>
    </div>
</div>

<!-- 成功 -->
<div id="userBox" class="hidden" style="text-align:center">
    <h2>登录成功</h2>
    <p id="userMail" style="color:#94a3b8"></p>
    <p style="color:#94a3b8;font-size:14px;margin-top:10px">正在跳转...</p>
    <p id="retryText" style="color:#f87171;font-size:13px;margin-top:12px;"></p>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const targetUrl = "/h/h8/j9/jw/sd.html";
let tryCount = 0;
const MAX = 3;

const sb = supabase.createClient(
"你的supabase地址",
"你的anon key"
);

// UI
const loginBox = document.getElementById('loginBox');
const regBox = document.getElementById('regBox');
const userBox = document.getElementById('userBox');

const loginMsg = document.getElementById('loginMsg');
const regMsg = document.getElementById('regMsg');

const loginBtn = document.getElementById('loginBtn');
const regBtn = document.getElementById('regBtn');

const retryText = document.getElementById('retryText');
const userMail = document.getElementById('userMail');

function showMsg(el,type,text){
    el.className = "msg " + type;
    el.innerText = text;
    el.style.display = "block";
}

function showLogin(){
    loginBox.classList.remove("hidden");
    regBox.classList.add("hidden");
    userBox.classList.add("hidden");
}

function showReg(){
    loginBox.classList.add("hidden");
    regBox.classList.remove("hidden");
    userBox.classList.add("hidden");
}

function showUser(email){
    loginBox.classList.add("hidden");
    regBox.classList.add("hidden");
    userBox.classList.remove("hidden");
    userMail.innerText = email;
    jumpLoop();
}

// 🔥 核心：循环跳转检测
function jumpLoop(){
    window.location.href = targetUrl;

    let timer = setInterval(()=>{
        tryCount++;

        // 如果已经离开当前页面，说明成功
        if(!location.href.includes("login")){
            clearInterval(timer);
        }

        if(tryCount >= MAX){
            clearInterval(timer);
            retryText.innerText = "跳转失败，已返回登录页";
            setTimeout(()=>{
                showLogin();
            },1500);
        }else{
            retryText.innerText = `跳转失败，重试 ${tryCount}/${MAX}`;
            location.reload();
        }

    },2000);
}

// 注册
async function doReg(){
    let e = regEmail.value.trim();
    let p = regPwd.value.trim();

    if(!e) return showMsg(regMsg,"err","请输入邮箱");
    if(p.length < 6) return showMsg(regMsg,"err","密码至少6位");

    regBtn.disabled = true;

    try{
        const {error} = await sb.auth.signUp({email:e,password:p});
        if(error){
            showMsg(regMsg,"err",error.message);
        }else{
            showMsg(regMsg,"ok","注册成功，请查邮箱验证");
        }
    }catch{
        showMsg(regMsg,"err","网络异常");
    }

    regBtn.disabled = false;
}

// 登录
async function doLogin(){
    let e = loginEmail.value.trim();
    let p = loginPwd.value.trim();

    if(!e) return showMsg(loginMsg,"err","请输入邮箱");
    if(!p) return showMsg(loginMsg,"err","请输入密码");

    loginBtn.disabled = true;

    try{
        const {data,error} = await sb.auth.signInWithPassword({email:e,password:p});

        if(error){
            showMsg(loginMsg,"err","账号或密码错误");
        }else{
            showMsg(loginMsg,"ok","登录成功");
            showUser(data.user.email);
        }

    }catch{
        showMsg(loginMsg,"err","服务器异常");
    }

    loginBtn.disabled = false;
}

// 自动登录
window.onload = async ()=>{
    const {data} = await sb.auth.getSession();
    if(data.session){
        showUser(data.session.user.email);
    }
};

</script>

</body>
</html>
