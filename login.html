<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>账号登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#0f172a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{width:100%;max-width:400px;background:#1e293b;border-radius:12px;padding:32px}
h2{text-align:center;margin-bottom:24px}
.item{margin-bottom:18px}
label{display:block;margin-bottom:6px;color:#cbd5e1;font-size:14px}
input{width:100%;padding:12px;border:1px solid #334155;border-radius:8px;background:#0f172a;color:#fff;font-size:16px}
.btn{width:100%;padding:13px;border:none;border-radius:8px;background:#2563eb;color:#fff;font-size:16px;cursor:pointer}
.tip{text-align:center;margin-top:20px;font-size:14px;color:#94a3b8}
.tip button{background:none;border:none;color:#3b82f6;cursor:pointer;font-size:14px}
.msg{padding:10px;border-radius:6px;margin:12px 0;text-align:center;font-size:14px;display:none}
.err{background:#991b1b;display:block}
.ok{background:#065f46;display:block}
</style>
</head>
<body>
<div class="box">

    <!-- 登录 -->
    <div id="loginBox">
        <h2>账号登录</h2>
        <div class="msg" id="loginMsg"></div>
        <div class="item">
            <label>邮箱</label>
            <input type="email" id="loginEmail">
        </div>
        <div class="item">
            <label>密码</label>
            <input type="password" id="loginPwd">
        </div>
        <button class="btn" onclick="doLogin()">登录</button>
        <div class="tip">没有账号？<button onclick="showReg()">去注册</button></div>
    </div>

    <!-- 注册 -->
    <div id="regBox" style="display:none">
        <h2>账号注册</h2>
        <div class="msg" id="regMsg"></div>
        <div class="item">
            <label>邮箱</label>
            <input type="email" id="regEmail">
        </div>
        <div class="item">
            <label>密码（至少6位）</label>
            <input type="password" id="regPwd">
        </div>
        <button class="btn" onclick="doReg()">立即注册</button>
        <div class="tip">已有账号？<button onclick="showLogin()">去登录</button></div>
    </div>

    <!-- 登录成功 -->
    <div id="userBox" style="display:none;text-align:center">
        <h2>登录成功</h2>
        <p id="userMail" style="margin:20px 0;color:#ccc"></p>
        <button class="btn" onclick="doLogout()">退出登录</button>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl = "https://czispkecvokqsvomquqo.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6aXNwa2Vjdm9rcXN2b21xdXFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxODc4MDEsImV4cCI6MjA5Mjc2MzgwMX0.0S1DcKYE1aVjaZsAKURzGdd4X2G2q5o570Q6pUiOWp0";
const sb = supabase.createClient(supabaseUrl, supabaseKey);

// 页面载入检测登录
(async function(){
    const {data:{user}} = await sb.auth.getUser();
    if(user){
        showUser();
        document.getElementById("userMail").innerText = user.email;
    }
})();

// 切换
function showLogin(){
    document.getElementById("loginBox").style.display="block";
    document.getElementById("regBox").style.display="none";
    document.getElementById("userBox").style.display="none";
}
function showReg(){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("regBox").style.display="block";
    document.getElementById("userBox").style.display="none";
}
function showUser(){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("regBox").style.display="none";
    document.getElementById("userBox").style.display="block";
}

// 注册
async function doReg(){
    let email = document.getElementById("regEmail").value.trim();
    let pwd = document.getElementById("regPwd").value.trim();
    let msg = document.getElementById("regMsg");
    msg.style.display = "none";

    if(!email){msg.className="msg err";msg.innerText="请输入邮箱";return}
    if(pwd.length<6){msg.className="msg err";msg.innerText="密码至少6位";return}

    const {error} = await sb.auth.signUp({
        email:email,
        password:pwd,
        options:{emailRedirectTo:"https://ddaa.online/login.html"}
    });

    if(error){
        msg.className="msg err";
        msg.innerText=error.message;
    }else{
        msg.className="msg ok";
        msg.innerText="注册成功！请去邮箱验证";
    }
}

// 登录
async function doLogin(){
    let email = document.getElementById("loginEmail").value.trim();
    let pwd = document.getElementById("loginPwd").value.trim();
    let msg = document.getElementById("loginMsg");
    msg.style.display = "none";

    const {data,error} = await sb.auth.signInWithPassword({email,pwd});
    if(error){
        msg.className="msg err";
        msg.innerText=error.message;
    }else{
        document.getElementById("userMail").innerText = data.user.email;
        showUser();
    }
}

// 退出
async function doLogout(){
    await sb.auth.signOut();
    showLogin();
}
</script>
</body>
</html>
