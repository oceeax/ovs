<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>稳定登录系统</title>
<style>
body{margin:0;background:#0f172a;color:#fff;font-family:system-ui;display:flex;justify-content:center;align-items:center;height:100vh}
.box{width:380px;background:#1e293b;padding:28px;border-radius:12px}
h2{text-align:center;margin-bottom:20px}
input{width:100%;padding:12px;margin:8px 0;border-radius:6px;border:1px solid #334155;background:#0f172a;color:#fff}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:6px;background:#2563eb;color:#fff;cursor:pointer}
button:disabled{background:#475569;cursor:not-allowed;}
.msg{padding:10px;border-radius:6px;margin-top:10px;display:none;font-size:14px;text-align:center}
.err{background:#7f1d1d;display:block}
.ok{background:#065f46;display:block}
.tip{text-align:center;margin-top:10px;color:#94a3b8;font-size:14px}
.tip button{background:none;border:none;color:#3b82f6;cursor:pointer}
.hidden{display:none}
</style>
</head>
<body>

<div class="box">
    <!-- 登录 -->
    <div id="loginBox">
        <h2>登录</h2>
        <div id="loginMsg" class="msg"></div>
        <input id="loginEmail" placeholder="邮箱">
        <input id="loginPwd" type="password" placeholder="密码">
        <button id="loginBtn" onclick="doLogin()">登录</button>
        <div class="tip">没有账号？ <button onclick="showReg()">去注册</button></div>
    </div>

    <!-- 注册 -->
    <div id="regBox" class="hidden">
        <h2>注册</h2>
        <div id="regMsg" class="msg"></div>
        <input id="regEmail" placeholder="邮箱">
        <input id="regPwd" type="password" placeholder="密码">
        <button id="regBtn" onclick="doReg()">注册</button>
        <div class="tip">已有账号？ <button onclick="showLogin()">去登录</button></div>
    </div>

    <!-- 成功 -->
    <div id="userBox" class="hidden" style="text-align:center">
        <h2>登录成功</h2>
        <p id="userMail" style="color:#94a3b8"></p>
        <p style="color:#94a3b8;font-size:14px;margin-top:10px">正在跳转到首页...</p>
    </div>
</div>

<!-- Supabase 核心引入 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// DOM 元素
const loginBox = document.getElementById('loginBox');
const regBox = document.getElementById('regBox');
const userBox = document.getElementById('userBox');
const loginMsg = document.getElementById('loginMsg');
const regMsg = document.getElementById('regMsg');
const loginEmail = document.getElementById('loginEmail');
const loginPwd = document.getElementById('loginPwd');
const regEmail = document.getElementById('regEmail');
const regPwd = document.getElementById('regPwd');
const userMail = document.getElementById('userMail');
const loginBtn = document.getElementById('loginBtn');
const regBtn = document.getElementById('regBtn');

// Supabase 初始化
const sb = supabase.createClient(
    "https://czispkecvokqsvomquqo.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6aXNwa2Vjdm9rcXN2b21xdXFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxODc4MDEsImV4cCI6MjA5Mjc2MzgwMX0.0S1DcKYE1aVjaZsAKURzGdd4X2G2q5o570Q6pUiOWp0"
);
    // ========== 真正有效 单设备唯一登录 / 全设备互踢 修复版 ==========
async function kickAllOtherSessions() {
  // 获取当前用户全部会话
  const { data: { sessions }, error } = await sb.auth.getSessions();
  if (error || !sessions) return;

  // 获取本次最新登录的会话ID
  const { data: { session } } = await sb.auth.getSession();
  const nowId = session?.id;

  // 遍历删除 所有不是当前的会话
  for (const item of sessions) {
    if (item.id !== nowId) {
      await sb.auth.admin.signOut(item.id);
    }
  }
}

// 拦截登录，登录成功自动踢所有旧设备
const oldLogin = sb.auth.signInWithPassword;
sb.auth.signInWithPassword = async function (args) {
  const res = await oldLogin.apply(this, arguments);
  if (!res.error) {
    // 登录成功 → 立刻踢掉电脑/手机/其他浏览器全部旧登录
    await kickAllOtherSessions();
  }
  return res;
};

// 被挤下线 自动跳转登录页
sb.auth.onAuthStateChange((state) => {
  if (state === "signed_out") {
    location.href = "login.html";
  }
});
// ====================================================
// ========== 单设备唯一登录、挤下线 核心代码 ==========
async function kickOtherSessions() {
  const { data: { sessions }, error } = await sb.auth.getSessions();
  if (error || !sessions || sessions.length <= 1) return;

  // 保留当前会话，全部踢掉其它会话
  const currentId = (await sb.auth.getSession()).data.session?.id;
  for (const s of sessions) {
    if (s.id !== currentId) {
      await sb.auth.signOut({ scope: "others" });
      break;
    }
  }
}

// 每次登录成功 自动执行踢下线
const originSignIn = sb.auth.signInWithPassword;
sb.auth.signInWithPassword = async function (opts) {
  const res = await originSignIn.call(sb.auth, opts);
  // 登录成功后，清理异地登录
  if(!res.error) kickOtherSessions();
  return res;
};

// 页面打开自动检测：异地被挤 强制退到登录页
sb.auth.onAuthStateChange((event) => {
  if (event === "signed_out") {
    window.location.href = "login.html";
  }
});
// ====================================================
// 一分钟冷却
const COOLDOWN = 60;
let regCooldown = false;

// 切换
function showLogin(){
    loginBox.classList.remove("hidden");
    regBox.classList.add("hidden");
    userBox.classList.add("hidden");
    loginMsg.style.display = "none";
}
function showReg(){
    loginBox.classList.add("hidden");
    regBox.classList.remove("hidden");
    userBox.classList.add("hidden");
    regMsg.style.display = "none";
}
function showUser(email){
    loginBox.classList.add("hidden");
    regBox.classList.add("hidden");
    userBox.classList.remove("hidden");
    if(email) userMail.innerText = email;
}

// 注册
async function doReg(){
    if (regCooldown) {
        regMsg.className="msg err";
        regMsg.innerText="请一分钟后再试";
        return;
    }

    let email = regEmail.value.trim();
    let password = regPwd.value.trim();
    regMsg.style.display = "none";

    if(!email){
        regMsg.className="msg err";
        regMsg.innerText="请输入邮箱";
        return;
    }
    if(password.length < 6){
        regMsg.className="msg err";
        regMsg.innerText="密码至少6位";
        return;
    }

    regBtn.disabled = true;

    const { error } = await sb.auth.signUp({
        email: email,
        password: password,
        options: {
            emailRedirectTo: "https://ddaa.online/login.html"
        }
    });

    regBtn.disabled = false;

    if(error){
        if(error.message.includes("rate limit")){
            regMsg.className="msg err";
            regMsg.innerText="请一分钟后再试";
            regCooldown = true;
            setTimeout(() => {
                regCooldown = false;
            }, COOLDOWN * 1000);
        } else {
            regMsg.className="msg err";
            regMsg.innerText = error.message;
        }
    }else{
        regMsg.className="msg ok";
        regMsg.innerText="注册成功！请前往邮箱验证";
    }
}

// 登录
async function doLogin(){
    let email = loginEmail.value.trim();
    let password = loginPwd.value.trim();
    loginMsg.style.display = "none";

    if(!email){
        loginMsg.className="msg err";
        loginMsg.innerText="请输入邮箱";
        return;
    }
    if(!password){
        loginMsg.className="msg err";
        loginMsg.innerText="请输入密码";
        return;
    }

    loginBtn.disabled = true;

    try{
        const { data, error } = await sb.auth.signInWithPassword({
            email: email,
            password: password
        });

        if(error){
            loginMsg.className="msg err";
            loginMsg.innerText = "用户不存在或密码错误";
        }else{
            loginMsg.className="msg ok";
            loginMsg.innerText = "登录成功！正在跳转...";
            showUser(data.user.email);
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1000);
        }
    }catch(e){
        loginMsg.className="msg err";
        loginMsg.innerText = "请求异常，请稍后重试";
    }

    loginBtn.disabled = false;
}

// 页面加载检测登录状态
window.onload = async () => {
    try{
        const { data } = await sb.auth.getSession();
        if(data.session?.user){
            showUser(data.session.user.email);
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1000);
        }
    }catch(e){}
};
</script>

</body>
</html>
